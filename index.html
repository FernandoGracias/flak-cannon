<script type="module">
import*as THREE from'three';

// ---- Audio ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function initAudio(){if(!actx)actx=new AudioCtx()}

function playCannonFire(){
  if(!actx)return;
  const t=actx.currentTime;
  // Deep boom with sub-bass
  const osc=actx.createOscillator(),g=actx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(60,t);osc.frequency.exponentialRampToValueAtTime(20,t+0.4);
  g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  osc.connect(g);g.connect(actx.destination);osc.start(t);osc.stop(t+0.4);
  // Noise burst for the crack
  const buf=actx.createBuffer(1,actx.sampleRate*0.15,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const src=actx.createBufferSource(),gn=actx.createGain();
  src.buffer=buf;gn.gain.setValueAtTime(0.4,t);gn.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(gn);gn.connect(actx.destination);src.start(t);
}

function playShellExplode(){
  if(!actx)return;
  const t=actx.currentTime;
  // Sharp crack
  const buf=actx.createBuffer(1,actx.sampleRate*0.08,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  src.connect(g);g.connect(actx.destination);src.start(t);
  // Echo/reverb tail
  const buf2=actx.createBuffer(1,actx.sampleRate*0.6,actx.sampleRate),d2=buf2.getChannelData(0);
  for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*0.15*Math.pow(1-i/d2.length,2);
  const src2=actx.createBufferSource(),g2=actx.createGain();
  src2.buffer=buf2;g2.gain.setValueAtTime(0.15,t+0.05);g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  src2.connect(g2);g2.connect(actx.destination);src2.start(t+0.05);
}

function playPlaneExplode(){
  if(!actx)return;
  const t=actx.currentTime;
  // Big explosion noise
  const buf=actx.createBuffer(1,actx.sampleRate*0.8,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.7,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
  src.connect(g);g.connect(actx.destination);src.start(t);
  // Low rumble
  const osc=actx.createOscillator(),go=actx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(40,t);osc.frequency.exponentialRampToValueAtTime(15,t+0.6);
  go.gain.setValueAtTime(0.5,t);go.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  osc.connect(go);go.connect(actx.destination);osc.start(t);osc.stop(t+0.6);
}

// ---- Engine ----
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,2000);
camera.position.set(0,8,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setClearColor(0x1a1a4e);
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

// ---- Sky (dawn/dusk) ----
function createSky(){
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  const grd=ctx.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#0b0b2a');
  grd.addColorStop(0.25,'#1b1b4e');
  grd.addColorStop(0.45,'#4a2060');
  grd.addColorStop(0.6,'#c84b31');
  grd.addColorStop(0.72,'#f4a261');
  grd.addColorStop(0.85,'#e9c46a');
  grd.addColorStop(1,'#264653');
  ctx.fillStyle=grd;ctx.fillRect(0,0,512,512);
  for(let i=0;i<300;i++){
    const x=Math.random()*512,y=Math.random()*230,a=Math.random()*.7+.1;
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fillRect(x,y,1.5,1.5);
  }
  const tex=new THREE.CanvasTexture(c);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,32),new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide})));
}
createSky();

// ---- Lighting ----
scene.add(new THREE.AmbientLight(0xffa070,.6));
const dirLight=new THREE.DirectionalLight(0xffe0b0,1.2);
dirLight.position.set(-50,80,-30);scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0x8888cc,0x443322,.4));

// ---- Ground ----
{const gm=new THREE.Mesh(new THREE.PlaneGeometry(2000,2000),new THREE.MeshLambertMaterial({color:0x1a2a1a}));gm.rotation.x=-Math.PI/2;scene.add(gm);}

// ---- Clouds ----
const clouds=[];
function makeCloud(x,y,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffeedd,transparent:true,opacity:.35});
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(8+Math.random()*12,8,6),mat);
    s.position.set(Math.random()*20-10,Math.random()*4,Math.random()*20-10);
    s.scale.y=.4+Math.random()*.3;g.add(s);
  }
  g.position.set(x,y,z);scene.add(g);clouds.push(g);
}
for(let i=0;i<25;i++)makeCloud(Math.random()*1600-800,60+Math.random()*120,Math.random()*1600-800);

// ---- QUAD 40mm BOFORS MOUNT ----
const cannonGroup=new THREE.Group();
const cannonPivot=new THREE.Group();

// Base platform - heavy circular base
const baseMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const base=new THREE.Mesh(new THREE.CylinderGeometry(3.2,3.8,1.4,12),baseMat);
base.position.y=0.7;cannonGroup.add(base);

// Turret ring
const ringMat=new THREE.MeshLambertMaterial({color:0x4a4a4a});
const ring=new THREE.Mesh(new THREE.CylinderGeometry(2.5,2.8,0.6,16),ringMat);
ring.position.y=1.6;cannonGroup.add(ring);

// Main turret housing - beefy box
const mountMat=new THREE.MeshLambertMaterial({color:0x505050});
const mount=new THREE.Mesh(new THREE.BoxGeometry(3.5,2,3),mountMat);
mount.position.set(0,0.2,0);cannonPivot.add(mount);

// Armored shield - front plate (angled)
const shieldMat=new THREE.MeshLambertMaterial({color:0x4a5a4a});
const shieldFront=new THREE.Mesh(new THREE.BoxGeometry(4,2.8,0.2),shieldMat);
shieldFront.position.set(0,0.3,-1.6);cannonPivot.add(shieldFront);

// Shield side plates
const shieldL=new THREE.Mesh(new THREE.BoxGeometry(0.2,2.8,3.4),shieldMat);
shieldL.position.set(-2,0.3,0);cannonPivot.add(shieldL);
const shieldR=new THREE.Mesh(new THREE.BoxGeometry(0.2,2.8,3.4),shieldMat);
shieldR.position.set(2,0.3,0);cannonPivot.add(shieldR);

// Shield top plate
const shieldTop=new THREE.Mesh(new THREE.BoxGeometry(4,0.15,3.4),shieldMat);
shieldTop.position.set(0,1.7,0);cannonPivot.add(shieldTop);

// Four barrels in 2x2 grid: [TL, TR, BL, BR]
const barrelMat=new THREE.MeshLambertMaterial({color:0x606060});
const barrelPositions=[
  {x:-0.55,y:0.8},  // top-left
  {x:0.55,y:0.8},   // top-right
  {x:-0.55,y:-0.1},  // bottom-left
  {x:0.55,y:-0.1},   // bottom-right
];
const barrels=[];
const barrelFlashes=[];
const barrelRestZ=-3.5; // barrel tip resting Z position

for(let i=0;i<4;i++){
  const bp=barrelPositions[i];
  const bGroup=new THREE.Group();

  // Main barrel tube
  const tube=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.18,5.5,8),barrelMat);
  tube.rotation.x=Math.PI/2;tube.position.set(0,0,-2.8);bGroup.add(tube);

  // Flash suppressor at tip
  const tipMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
  const tip=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.15,0.5,8),tipMat);
  tip.rotation.x=Math.PI/2;tip.position.set(0,0,-5.6);bGroup.add(tip);

  // Barrel jacket/sleeve near breach
  const sleeve=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,1.2,8),barrelMat);
  sleeve.rotation.x=Math.PI/2;sleeve.position.set(0,0,-0.2);bGroup.add(sleeve);

  bGroup.position.set(bp.x,bp.y,-1.6);
  cannonPivot.add(bGroup);
  barrels.push({group:bGroup,restZ:-1.6,recoil:0});

  // Muzzle flash (hidden by default)
  const flashGeo=new THREE.SphereGeometry(0.5,6,6);
  const flashMat=new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0});
  const flash=new THREE.Mesh(flashGeo,flashMat);
  flash.position.set(bp.x,bp.y,-7.4);
  cannonPivot.add(flash);
  barrelFlashes.push(flash);
}

// Ammo feed mechanism between barrel pairs
const feedMat=new THREE.MeshLambertMaterial({color:0x444444});
const feedL=new THREE.Mesh(new THREE.BoxGeometry(0.4,1.2,1.5),feedMat);
feedL.position.set(-0.55,0.35,0.8);cannonPivot.add(feedL);
const feedR=new THREE.Mesh(new THREE.BoxGeometry(0.4,1.2,1.5),feedMat);
feedR.position.set(0.55,0.35,0.8);cannonPivot.add(feedR);

// Seat/shoulder rests on sides (gunner positions)
const seatMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const seatL=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.6,1.2),seatMat);
seatL.position.set(-2.6,-0.3,0.5);cannonPivot.add(seatL);
const seatR=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.6,1.2),seatMat);
seatR.position.set(2.6,-0.3,0.5);cannonPivot.add(seatR);

cannonPivot.position.y=2;
cannonGroup.add(cannonPivot);
cannonGroup.position.set(0,-4,-5);
camera.add(cannonGroup);
scene.add(camera);

// ---- Auto-fire state ----
let mouseDown=false,currentBarrel=0,fireTimer=0;
const FIRE_INTERVAL=1/8; // ~2 rounds/sec total = 8 barrel-fires/sec? No: 2 rounds/sec = 0.5s per round, 4 barrels cycling = 0.125s per barrel
// Actually: "~2 rounds per second total" means 2 shells/sec, so interval = 0.5s
// But with 4 barrels cycling, each barrel fires every 2s, and we get a shot every 0.5s
const FIRE_RATE=0.5; // seconds between shots (2 rounds/sec total)

// ---- Game State (Fix #5: no waves, lives, game over) ----
let score=0,gameActive=false;
const shells=[],planes=[],flakPuffs=[],debris=[];
let aimPitch=0.3,aimYaw=0;
const SHELL_SPEED=180,BLAST_RADIUS=12;
let spawnTimer=0,spawnInterval=1.8;
let mouseX=0,mouseY=0;

const scoreEl=document.getElementById('score');

// ---- Plane factory ----
function createPlane(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,1,8),new THREE.MeshLambertMaterial({color:0x556655}));
  g.add(body);
  const wing=new THREE.Mesh(new THREE.BoxGeometry(16,.2,3),new THREE.MeshLambertMaterial({color:0x667766}));
  wing.position.y=.2;g.add(wing);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(5,.15,1.5),new THREE.MeshLambertMaterial({color:0x667766}));
  tail.position.set(0,.3,-3.5);g.add(tail);
  const vTail=new THREE.Mesh(new THREE.BoxGeometry(.2,3,2),new THREE.MeshLambertMaterial({color:0x556655}));
  vTail.position.set(0,1.5,-3.5);g.add(vTail);
  for(let s of[-4,4]){
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,2,6),new THREE.MeshLambertMaterial({color:0x444444}));
    eng.rotation.x=Math.PI/2;eng.position.set(s,-.2,1);g.add(eng);
  }
  return g;
}

function spawnPlane(){
  const mesh=createPlane();
  // Varied altitudes: some low and easy, some very high and hard
  const altRoll=Math.random();
  const alt=altRoll<0.25?40+Math.random()*30       // low: 40-70
           :altRoll<0.6?70+Math.random()*60         // mid: 70-130
           :altRoll<0.85?130+Math.random()*70       // high: 130-200
           :200+Math.random()*80;                    // very high: 200-280
  const angle=Math.random()*Math.PI*2;
  const dist=500+Math.random()*200;
  const sx=Math.cos(angle)*dist,sz=Math.sin(angle)*dist;
  // Varied speeds: some slow bombers, some fast fighters
  const speedRoll=Math.random();
  const speed=speedRoll<0.3?18+Math.random()*10     // slow: 18-28
             :speedRoll<0.7?28+Math.random()*18     // medium: 28-46
             :46+Math.random()*25;                   // fast: 46-71
  const tx=Math.random()*200-100,tz=Math.random()*200-100;
  const dx=tx-sx,dz=tz-sz,len=Math.sqrt(dx*dx+dz*dz);
  const vx=dx/len*speed,vz=dz/len*speed;
  mesh.position.set(sx,alt,sz);
  mesh.lookAt(sx+vx,alt,sz+vz);
  // Scale planes at high altitude to look smaller
  const s=alt>150?0.7:alt>100?0.85:1;
  mesh.scale.setScalar(s);
  scene.add(mesh);
  // HP: 1-3 depending on type
  const hp=speedRoll<0.3?3:speedRoll<0.7?2:1; // slow bombers=tough, fast fighters=fragile
  planes.push({mesh,vx,vz,alt,speed,hp,maxHp:hp,smoking:false,smokeTrail:[]});
}

// ---- Shell: visible traveling projectile ----
function fireShell(){
  playCannonFire();

  // Fire from current barrel
  const bi=currentBarrel;
  currentBarrel=(currentBarrel+1)%4;

  // Barrel recoil
  barrels[bi].recoil=0.6;

  // Muzzle flash on this barrel
  barrelFlashes[bi].material.opacity=1;
  setTimeout(()=>{barrelFlashes[bi].material.opacity=0},60);

  // Muzzle flash light
  const bp=barrelPositions[bi];
  const flashLight=new THREE.PointLight(0xffaa00,4,20);
  const worldPos=new THREE.Vector3();
  barrelFlashes[bi].getWorldPosition(worldPos);
  flashLight.position.copy(worldPos);
  scene.add(flashLight);
  setTimeout(()=>scene.remove(flashLight),80);

  const dir=new THREE.Vector3(0,0,-1);
  dir.applyQuaternion(camera.quaternion);
  dir.normalize();
  // Tracer round - small bright dot
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(.25,4,4),new THREE.MeshBasicMaterial({color:0xffcc00}));
  mesh.position.copy(camera.position).add(new THREE.Vector3(0,-1,0));
  // Tracer tail
  const tail=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,2,4),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.6}));
  tail.lookAt(dir);tail.rotateX(Math.PI/2);
  mesh.add(tail);
  scene.add(mesh);
  shells.push({mesh,dir,speed:SHELL_SPEED,traveled:0,alive:true});
}

// ---- Flak Burst: dark grey/black puffs that linger in the sky ----
function createFlakBurst(pos){
  playShellExplode();
  const g=new THREE.Group();
  // Dark smoke puffs - the iconic flak burst look
  for(let i=0;i<14;i++){
    const shade=0x1a1a1a+Math.floor(Math.random()*0x222222);
    const puff=new THREE.Mesh(
      new THREE.SphereGeometry(1.5+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color:shade,transparent:true,opacity:0.85})
    );
    const offset=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*4);
    puff.position.copy(offset);
    puff.userData.vel=offset.clone().normalize().multiplyScalar(1.5+Math.random()*2);
    g.add(puff);
  }
  // Brief orange flash at center
  const flash=new THREE.Mesh(
    new THREE.SphereGeometry(1.5,6,6),
    new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.9})
  );
  flash.userData.isFlash=true;
  g.add(flash);
  g.position.copy(pos);scene.add(g);
  const light=new THREE.PointLight(0xff6600,3,40);light.position.copy(pos);scene.add(light);
  // Linger for 4-6 seconds so sky fills with puffs
  flakPuffs.push({group:g,light,age:0,duration:4+Math.random()*2});
}

// Check if a flak burst damages any planes within blast radius
function checkFlakDamage(pos){
  for(let j=planes.length-1;j>=0;j--){
    const p=planes[j];
    const dist=p.mesh.position.distanceTo(pos);
    if(dist<BLAST_RADIUS){
      p.hp--;
      if(p.hp>0&&!p.smoking){
        // Start smoke trail on damaged planes
        p.smoking=true;
      }
      if(p.hp<=0){
        score++;
        scoreEl.textContent='Score: '+score;
        explodePlane(p.mesh.position.clone());
        scene.remove(p.mesh);
        // Clean up smoke trail
        p.smokeTrail.forEach(s=>scene.remove(s));
        planes.splice(j,1);
      }
    }
  }
}

// ---- Plane Explosion (Fix #3: visible fire, debris, breaking apart) ----
function explodePlane(pos){
  playPlaneExplode();
  // Fire ball
  const fireGroup=new THREE.Group();
  for(let i=0;i<15;i++){
    const color=[0xff4400,0xff8800,0xffcc00,0xff2200][Math.floor(Math.random()*4)];
    const ball=new THREE.Mesh(
      new THREE.SphereGeometry(1+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:1})
    );
    const d=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*4);
    ball.position.copy(d);
    ball.userData.vel=d.clone().normalize().multiplyScalar(15+Math.random()*20);
    fireGroup.add(ball);
  }
  // Black smoke
  for(let i=0;i<10;i++){
    const smoke=new THREE.Mesh(
      new THREE.SphereGeometry(2+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color:0x222222,transparent:true,opacity:0.7})
    );
    const d=new THREE.Vector3(Math.random()-0.5,Math.random()*0.5,Math.random()-0.5).normalize().multiplyScalar(3+Math.random()*5);
    smoke.position.copy(d);
    smoke.userData.vel=d.clone().normalize().multiplyScalar(5+Math.random()*8);
    fireGroup.add(smoke);
  }
  fireGroup.position.copy(pos);scene.add(fireGroup);
  const light=new THREE.PointLight(0xff4400,8,80);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:fireGroup,light,age:0,duration:2.0});

  // Debris pieces falling
  for(let i=0;i<12;i++){
    const size=0.5+Math.random()*2;
    const geo=Math.random()>0.5?new THREE.BoxGeometry(size,0.3,size*2):new THREE.BoxGeometry(size*2,0.2,size);
    const color=Math.random()>0.5?0x556655:0x667766;
    const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color}));
    m.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*8,(Math.random()-0.5)*4,(Math.random()-0.5)*8));
    const vel=new THREE.Vector3((Math.random()-0.5)*40,Math.random()*10-15,(Math.random()-0.5)*40);
    const rotVel=new THREE.Vector3(Math.random()*5,Math.random()*5,Math.random()*5);
    scene.add(m);debris.push({mesh:m,vel,rotVel,age:0});
  }
  // Flaming debris
  for(let i=0;i<6;i++){
    const fire=new THREE.Mesh(new THREE.SphereGeometry(0.6,4,4),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true}));
    fire.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*6,Math.random()*2,(Math.random()-0.5)*6));
    const vel=new THREE.Vector3((Math.random()-0.5)*20,-10-Math.random()*15,(Math.random()-0.5)*20);
    scene.add(fire);debris.push({mesh:fire,vel,rotVel:new THREE.Vector3(),age:0,isFire:true});
  }
}

// ---- Input ----
document.addEventListener('mousemove',e=>{
  if(!gameActive)return;
  aimYaw+=e.movementX*-.002;
  aimPitch+=e.movementY*-.002;
  aimPitch=Math.max(.05,Math.min(1.4,aimPitch));
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameActive){fireShell();mouseDown=true;fireTimer=0;}
});
document.addEventListener('mouseup',e=>{
  if(e.button===0)mouseDown=false;
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ---- Game loop ----
let lastTime=0;
function update(time){
  requestAnimationFrame(update);
  if(!gameActive){renderer.render(scene,camera);return}
  const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;

  // Camera
  camera.rotation.set(0,0,0);
  camera.rotateY(-aimYaw);
  camera.rotateX(aimPitch);

  // Cannon is attached to camera, just tilt barrel slightly with pitch
  cannonPivot.rotation.set(0,0,0);

  // Auto-fire while holding mouse
  if(mouseDown){
    fireTimer+=dt;
    while(fireTimer>=FIRE_RATE){
      fireTimer-=FIRE_RATE;
      fireShell();
    }
  }

  // Barrel recoil animation
  for(let i=0;i<4;i++){
    const b=barrels[i];
    if(b.recoil>0){
      b.recoil=Math.max(0,b.recoil-dt*4);
      b.group.position.z=b.restZ+b.recoil*0.4;
    }else{
      b.group.position.z=b.restZ;
    }
  }

  // Spawn planes continuously (Fix #5: no waves, just endless)
  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    spawnPlane();
    // Gradually speed up spawning, min 0.8s
    spawnInterval=Math.max(0.8,spawnInterval-0.005);
  }

  // Update shells - they travel visibly, explode on proximity fuse or at max range
  for(let i=shells.length-1;i>=0;i--){
    const s=shells[i];
    s.mesh.position.addScaledVector(s.dir,s.speed*dt);
    s.traveled+=s.speed*dt;
    let detonated=false;
    // Proximity fuse: detonate if within 20 units of any plane (after min travel)
    if(s.traveled>40){
      for(let j=0;j<planes.length;j++){
        if(planes[j].mesh.position.distanceTo(s.mesh.position)<20){
          detonated=true;break;
        }
      }
    }
    // Also detonate at max range
    if(s.traveled>600)detonated=true;
    if(detonated){
      const burstPos=s.mesh.position.clone();
      createFlakBurst(burstPos);
      checkFlakDamage(burstPos);
      scene.remove(s.mesh);shells.splice(i,1);
    }
  }

  // Update planes (Fix #5: no lives lost, just remove when far)
  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.z+=p.vz*dt;
    // Smoke trail for damaged planes
    if(p.smoking){
      if(!p._smokeTimer)p._smokeTimer=0;
      p._smokeTimer+=dt;
      if(p._smokeTimer>0.08){
        p._smokeTimer=0;
        const smoke=new THREE.Mesh(
          new THREE.SphereGeometry(0.8+Math.random()*1.2,4,4),
          new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:0.5})
        );
        smoke.position.copy(p.mesh.position);
        scene.add(smoke);
        p.smokeTrail.push(smoke);
        smoke.userData.age=0;
      }
      // Fade and remove old smoke
      for(let si=p.smokeTrail.length-1;si>=0;si--){
        const sm=p.smokeTrail[si];
        sm.userData.age+=dt;
        sm.material.opacity=Math.max(0,0.5-sm.userData.age*0.15);
        sm.scale.setScalar(1+sm.userData.age*1.5);
        if(sm.userData.age>3){scene.remove(sm);p.smokeTrail.splice(si,1);}
      }
    }
    if(p.mesh.position.length()>800){
      p.smokeTrail.forEach(s=>scene.remove(s));
      scene.remove(p.mesh);planes.splice(i,1);
    }
  }

  // Update flak puffs & explosions - dark puffs linger in sky
  for(let i=flakPuffs.length-1;i>=0;i--){
    const e=flakPuffs[i];e.age+=dt;
    const t=e.age/e.duration;
    if(t>=1){scene.remove(e.group);scene.remove(e.light);flakPuffs.splice(i,1);continue}
    e.light.intensity=Math.max(0,e.light.intensity-dt*8);
    e.group.children.forEach(c=>{
      if(c.material){
        if(c.userData.isFlash){
          // Flash fades quickly
          c.material.opacity=Math.max(0,0.9-e.age*6);
        }else if(c.userData.vel){
          // Dark puffs expand slowly and fade very gradually
          c.position.addScaledVector(c.userData.vel,dt*0.3);
          c.scale.setScalar(1+t*2.5);
          // Stay mostly opaque for first 60% of life, then fade
          c.material.opacity=t<0.6?0.75:Math.max(0,0.75*(1-(t-0.6)/0.4));
        }
      }
    });
  }

  // Update debris
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];d.age+=dt;
    d.vel.y-=40*dt;
    d.mesh.position.addScaledVector(d.vel,dt);
    d.mesh.rotation.x+=d.rotVel.x*dt;
    d.mesh.rotation.z+=d.rotVel.z*dt;
    if(d.isFire)d.mesh.material.opacity=Math.max(0,1-d.age/2.5);
    if(d.mesh.position.y<0||d.age>6){scene.remove(d.mesh);debris.splice(i,1)}
  }

  // Clouds drift
  clouds.forEach(c=>{c.position.x+=2*dt;if(c.position.x>800)c.position.x=-800});

  renderer.render(scene,camera);
}

function startGame(){
  score=0;spawnInterval=1.8;spawnTimer=0;
  scoreEl.textContent='Score: 0';
  shells.forEach(s=>scene.remove(s.mesh));shells.length=0;
  planes.forEach(p=>{scene.remove(p.mesh);if(p.smokeTrail)p.smokeTrail.forEach(s=>scene.remove(s))});planes.length=0;
  flakPuffs.forEach(e=>{scene.remove(e.group);scene.remove(e.light)});flakPuffs.length=0;
  debris.forEach(d=>scene.remove(d.mesh));debris.length=0;
  gameActive=true;lastTime=performance.now();
  try{renderer.domElement.requestPointerLock();}catch(e){}
}
window._startGame=startGame;

document.getElementById('start-screen').addEventListener('click',()=>{
  initAudio();
  document.getElementById('start-screen').style.display='none';
  startGame();
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

requestAnimationFrame(update);
</script>
</body>
</html>
