<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flak Cannon</title>
<style>
*{margin:0;padding:0;overflow:hidden}
body{background:#000;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:20px;box-sizing:border-box}
#hud *{color:#fff;text-shadow:0 0 6px rgba(0,0,0,.8)}
#score{font-size:28px;font-weight:bold}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10}
#crosshair div{position:absolute;background:rgba(255,255,255,.8)}
#ch-t{width:2px;height:18px;left:-1px;top:-28px}
#ch-b{width:2px;height:18px;left:-1px;top:10px}
#ch-l{width:18px;height:2px;top:-1px;left:-28px}
#ch-r{width:18px;height:2px;top:-1px;left:10px}
#ch-dot{width:4px;height:4px;border-radius:50%;left:-2px;top:-2px;background:rgba(255,80,80,.9)}
#ch-ring{width:20px;height:20px;border:1px solid rgba(255,255,255,.3);border-radius:50%;left:-10px;top:-10px;background:transparent}
#start-screen{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;cursor:pointer}
#start-screen h1{font-size:64px;color:#fc0;text-shadow:0 0 30px #f80,0 0 60px #f40;margin-bottom:10px}
#start-screen p{font-size:22px;color:#ccc;margin-bottom:30px}
#start-screen .hint{font-size:16px;color:#888}
</style>
</head>
<body>
<div id="start-screen">
  <h1>FLAK CANNON</h1>
  <p>Defend the skies against incoming bombers</p>
  <div class="hint">Click to start — Mouse to aim, Left Click to fire</div>
</div>
<div id="hud">
  <div id="score">Score: 0</div>
</div>
<div id="crosshair"><div id="ch-t"></div><div id="ch-b"></div><div id="ch-l"></div><div id="ch-r"></div><div id="ch-dot"></div><div id="ch-ring"></div></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import*as THREE from'three';

// ---- Audio ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function initAudio(){if(!actx)actx=new AudioCtx()}

function playCannonFire(){
  if(!actx)return;
  const t=actx.currentTime;
  // Deep boom with sub-bass
  const osc=actx.createOscillator(),g=actx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(60,t);osc.frequency.exponentialRampToValueAtTime(20,t+0.4);
  g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  osc.connect(g);g.connect(actx.destination);osc.start(t);osc.stop(t+0.4);
  // Noise burst for the crack
  const buf=actx.createBuffer(1,actx.sampleRate*0.15,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const src=actx.createBufferSource(),gn=actx.createGain();
  src.buffer=buf;gn.gain.setValueAtTime(0.4,t);gn.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(gn);gn.connect(actx.destination);src.start(t);
}

function playShellExplode(){
  if(!actx)return;
  const t=actx.currentTime;
  // Sharp crack
  const buf=actx.createBuffer(1,actx.sampleRate*0.08,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  src.connect(g);g.connect(actx.destination);src.start(t);
  // Echo/reverb tail
  const buf2=actx.createBuffer(1,actx.sampleRate*0.6,actx.sampleRate),d2=buf2.getChannelData(0);
  for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*0.15*Math.pow(1-i/d2.length,2);
  const src2=actx.createBufferSource(),g2=actx.createGain();
  src2.buffer=buf2;g2.gain.setValueAtTime(0.15,t+0.05);g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  src2.connect(g2);g2.connect(actx.destination);src2.start(t+0.05);
}

function playPlaneExplode(){
  if(!actx)return;
  const t=actx.currentTime;
  // Big explosion noise
  const buf=actx.createBuffer(1,actx.sampleRate*0.8,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.7,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
  src.connect(g);g.connect(actx.destination);src.start(t);
  // Low rumble
  const osc=actx.createOscillator(),go=actx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(40,t);osc.frequency.exponentialRampToValueAtTime(15,t+0.6);
  go.gain.setValueAtTime(0.5,t);go.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  osc.connect(go);go.connect(actx.destination);osc.start(t);osc.stop(t+0.6);
}

// ---- Engine ----
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,2000);
camera.position.set(0,8,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

// ---- Sky (dawn/dusk) ----
function createSky(){
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  const grd=ctx.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#0b0b2a');
  grd.addColorStop(0.25,'#1b1b4e');
  grd.addColorStop(0.45,'#4a2060');
  grd.addColorStop(0.6,'#c84b31');
  grd.addColorStop(0.72,'#f4a261');
  grd.addColorStop(0.85,'#e9c46a');
  grd.addColorStop(1,'#264653');
  ctx.fillStyle=grd;ctx.fillRect(0,0,512,512);
  for(let i=0;i<300;i++){
    const x=Math.random()*512,y=Math.random()*230,a=Math.random()*.7+.1;
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fillRect(x,y,1.5,1.5);
  }
  const tex=new THREE.CanvasTexture(c);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,32),new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide})));
}
createSky();

// ---- Lighting ----
scene.add(new THREE.AmbientLight(0xffa070,.6));
const dirLight=new THREE.DirectionalLight(0xffe0b0,1.2);
dirLight.position.set(-50,80,-30);scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0x8888cc,0x443322,.4));

// ---- Ground ----
scene.add(Object.assign(new THREE.Mesh(new THREE.PlaneGeometry(2000,2000),new THREE.MeshLambertMaterial({color:0x1a2a1a})),{rotation:{x:-Math.PI/2,y:0,z:0}}));

// ---- Clouds ----
const clouds=[];
function makeCloud(x,y,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffeedd,transparent:true,opacity:.35});
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(8+Math.random()*12,8,6),mat);
    s.position.set(Math.random()*20-10,Math.random()*4,Math.random()*20-10);
    s.scale.y=.4+Math.random()*.3;g.add(s);
  }
  g.position.set(x,y,z);scene.add(g);clouds.push(g);
}
for(let i=0;i<25;i++)makeCloud(Math.random()*1600-800,60+Math.random()*120,Math.random()*1600-800);

// ---- FLAK CANNON MODEL (Fix #1) ----
const cannonGroup=new THREE.Group();
const cannonPivot=new THREE.Group(); // rotates to follow aim

// Base platform
const baseMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const base=new THREE.Mesh(new THREE.CylinderGeometry(2.5,3,1.2,8),baseMat);
base.position.y=0.6;cannonGroup.add(base);

// Turret ring
const ringMat=new THREE.MeshLambertMaterial({color:0x4a4a4a});
const ring=new THREE.Mesh(new THREE.CylinderGeometry(1.8,2,0.5,12),ringMat);
ring.position.y=1.4;cannonGroup.add(ring);

// Gun mount (the part that rotates)
const mountMat=new THREE.MeshLambertMaterial({color:0x505050});
const mount=new THREE.Mesh(new THREE.BoxGeometry(1.5,1,2),mountMat);
mount.position.set(0,0.3,0);cannonPivot.add(mount);

// Barrel
const barrelMat=new THREE.MeshLambertMaterial({color:0x606060});
const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,5,8),barrelMat);
barrel.rotation.x=Math.PI/2;
barrel.position.set(0,0.5,-2.8);cannonPivot.add(barrel);

// Barrel tip / flash suppressor
const tipMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const tip=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.25,0.6,8),tipMat);
tip.rotation.x=Math.PI/2;
tip.position.set(0,0.5,-5.3);cannonPivot.add(tip);

// Shield plates
const shieldMat=new THREE.MeshLambertMaterial({color:0x4a5a4a});
const shieldL=new THREE.Mesh(new THREE.BoxGeometry(0.15,1.5,2.5),shieldMat);
shieldL.position.set(-0.9,0.5,-0.5);cannonPivot.add(shieldL);
const shieldR=new THREE.Mesh(new THREE.BoxGeometry(0.15,1.5,2.5),shieldMat);
shieldR.position.set(0.9,0.5,-0.5);cannonPivot.add(shieldR);

cannonPivot.position.y=1.7;
cannonGroup.add(cannonPivot);
cannonGroup.position.set(0,0,0);
scene.add(cannonGroup);

// ---- Game State (Fix #5: no waves, lives, game over) ----
let score=0,gameActive=false;
const shells=[],planes=[],flakPuffs=[],debris=[];
let aimPitch=0.3,aimYaw=0;
const SHELL_SPEED=280,HIT_RADIUS=22;
let spawnTimer=0,spawnInterval=1.8;
let mouseX=0,mouseY=0;

const scoreEl=document.getElementById('score');

// ---- Plane factory ----
function createPlane(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,1,8),new THREE.MeshLambertMaterial({color:0x556655}));
  g.add(body);
  const wing=new THREE.Mesh(new THREE.BoxGeometry(16,.2,3),new THREE.MeshLambertMaterial({color:0x667766}));
  wing.position.y=.2;g.add(wing);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(5,.15,1.5),new THREE.MeshLambertMaterial({color:0x667766}));
  tail.position.set(0,.3,-3.5);g.add(tail);
  const vTail=new THREE.Mesh(new THREE.BoxGeometry(.2,3,2),new THREE.MeshLambertMaterial({color:0x556655}));
  vTail.position.set(0,1.5,-3.5);g.add(vTail);
  for(let s of[-4,4]){
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,2,6),new THREE.MeshLambertMaterial({color:0x444444}));
    eng.rotation.x=Math.PI/2;eng.position.set(s,-.2,1);g.add(eng);
  }
  return g;
}

function spawnPlane(){
  const mesh=createPlane();
  const alt=50+Math.random()*100;
  const angle=Math.random()*Math.PI*2;
  const dist=500+Math.random()*200;
  const sx=Math.cos(angle)*dist,sz=Math.sin(angle)*dist;
  const speed=25+Math.random()*20;
  const tx=Math.random()*200-100,tz=Math.random()*200-100;
  const dx=tx-sx,dz=tz-sz,len=Math.sqrt(dx*dx+dz*dz);
  const vx=dx/len*speed,vz=dz/len*speed;
  mesh.position.set(sx,alt,sz);
  mesh.lookAt(sx+vx,alt,sz+vz);
  scene.add(mesh);
  planes.push({mesh,vx,vz,alt,speed,hp:1});
}

// ---- Shell ----
function fireShell(){
  playCannonFire();
  const dir=new THREE.Vector3(0,0,-1);
  dir.applyAxisAngle(new THREE.Vector3(1,0,0),-aimPitch);
  dir.applyAxisAngle(new THREE.Vector3(0,1,0),-aimYaw);
  dir.normalize();
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(.3,4,4),new THREE.MeshBasicMaterial({color:0xffcc00}));
  mesh.position.copy(camera.position).add(new THREE.Vector3(0,-1,0));
  scene.add(mesh);
  const targetAlt=8+Math.tan(aimPitch)*200;
  shells.push({mesh,dir,speed:SHELL_SPEED,targetAlt:Math.max(25,targetAlt),traveled:0});
  // muzzle flash
  const flash=new THREE.PointLight(0xffaa00,3,30);
  flash.position.copy(mesh.position);scene.add(flash);
  setTimeout(()=>scene.remove(flash),80);
}

// ---- Flak Burst (Fix #6: black/grey puffs that linger) ----
function createFlakBurst(pos){
  playShellExplode();
  const g=new THREE.Group();
  // Dark smoke puffs - the signature look of flak
  for(let i=0;i<10;i++){
    const shade=0x222222+Math.floor(Math.random()*0x333333);
    const puff=new THREE.Mesh(
      new THREE.SphereGeometry(1.5+Math.random()*2.5,6,6),
      new THREE.MeshBasicMaterial({color:shade,transparent:true,opacity:0.8})
    );
    const offset=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(3+Math.random()*5);
    puff.position.copy(offset);
    puff.userData.vel=offset.clone().normalize().multiplyScalar(3+Math.random()*4);
    g.add(puff);
  }
  // Small orange flash at center
  const flash=new THREE.Mesh(
    new THREE.SphereGeometry(2,6,6),
    new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.9})
  );
  g.add(flash);
  g.position.copy(pos);scene.add(g);
  const light=new THREE.PointLight(0xff6600,3,40);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:g,light,age:0,duration:1.5});
}

// ---- Plane Explosion (Fix #3: visible fire, debris, breaking apart) ----
function explodePlane(pos){
  playPlaneExplode();
  // Fire ball
  const fireGroup=new THREE.Group();
  for(let i=0;i<15;i++){
    const color=[0xff4400,0xff8800,0xffcc00,0xff2200][Math.floor(Math.random()*4)];
    const ball=new THREE.Mesh(
      new THREE.SphereGeometry(1+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:1})
    );
    const d=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*4);
    ball.position.copy(d);
    ball.userData.vel=d.clone().normalize().multiplyScalar(15+Math.random()*20);
    fireGroup.add(ball);
  }
  // Black smoke
  for(let i=0;i<10;i++){
    const smoke=new THREE.Mesh(
      new THREE.SphereGeometry(2+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color:0x222222,transparent:true,opacity:0.7})
    );
    const d=new THREE.Vector3(Math.random()-0.5,Math.random()*0.5,Math.random()-0.5).normalize().multiplyScalar(3+Math.random()*5);
    smoke.position.copy(d);
    smoke.userData.vel=d.clone().normalize().multiplyScalar(5+Math.random()*8);
    fireGroup.add(smoke);
  }
  fireGroup.position.copy(pos);scene.add(fireGroup);
  const light=new THREE.PointLight(0xff4400,8,80);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:fireGroup,light,age:0,duration:2.0});

  // Debris pieces falling
  for(let i=0;i<12;i++){
    const size=0.5+Math.random()*2;
    const geo=Math.random()>0.5?new THREE.BoxGeometry(size,0.3,size*2):new THREE.BoxGeometry(size*2,0.2,size);
    const color=Math.random()>0.5?0x556655:0x667766;
    const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color}));
    m.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*8,(Math.random()-0.5)*4,(Math.random()-0.5)*8));
    const vel=new THREE.Vector3((Math.random()-0.5)*40,Math.random()*10-15,(Math.random()-0.5)*40);
    const rotVel=new THREE.Vector3(Math.random()*5,Math.random()*5,Math.random()*5);
    scene.add(m);debris.push({mesh:m,vel,rotVel,age:0});
  }
  // Flaming debris
  for(let i=0;i<6;i++){
    const fire=new THREE.Mesh(new THREE.SphereGeometry(0.6,4,4),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true}));
    fire.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*6,Math.random()*2,(Math.random()-0.5)*6));
    const vel=new THREE.Vector3((Math.random()-0.5)*20,-10-Math.random()*15,(Math.random()-0.5)*20);
    scene.add(fire);debris.push({mesh:fire,vel,rotVel:new THREE.Vector3(),age:0,isFire:true});
  }
}

// ---- Input ----
document.addEventListener('mousemove',e=>{
  if(!gameActive)return;
  aimYaw+=e.movementX*-.002;
  aimPitch+=e.movementY*-.002;
  aimPitch=Math.max(.05,Math.min(1.4,aimPitch));
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameActive)fireShell();
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ---- Game loop ----
let lastTime=0;
function update(time){
  requestAnimationFrame(update);
  if(!gameActive){renderer.render(scene,camera);return}
  const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;

  // Camera
  camera.rotation.set(0,0,0);
  camera.rotateY(-aimYaw);
  camera.rotateX(aimPitch);

  // Cannon follows aim (Fix #1)
  cannonPivot.rotation.set(0,0,0);
  cannonPivot.rotation.y=-aimYaw;
  cannonPivot.rotation.x=Math.min(0,-aimPitch+0.3);

  // Spawn planes continuously (Fix #5: no waves, just endless)
  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    spawnPlane();
    // Gradually speed up spawning, min 0.8s
    spawnInterval=Math.max(0.8,spawnInterval-0.005);
  }

  // Update shells
  for(let i=shells.length-1;i>=0;i--){
    const s=shells[i];
    s.mesh.position.addScaledVector(s.dir,s.speed*dt);
    s.traveled+=s.speed*dt;
    if(s.mesh.position.y>=s.targetAlt||s.traveled>600){
      const shellPos=s.mesh.position.clone();
      createFlakBurst(shellPos);
      // Hit detection (Fix #3)
      for(let j=planes.length-1;j>=0;j--){
        const p=planes[j];
        if(p.mesh.position.distanceTo(shellPos)<HIT_RADIUS){
          p.hp--;
          if(p.hp<=0){
            score++;
            scoreEl.textContent='Score: '+score;
            explodePlane(p.mesh.position.clone());
            scene.remove(p.mesh);planes.splice(j,1);
          }
        }
      }
      scene.remove(s.mesh);shells.splice(i,1);
    }
  }

  // Update planes (Fix #5: no lives lost, just remove when far)
  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.z+=p.vz*dt;
    if(p.mesh.position.length()>800){scene.remove(p.mesh);planes.splice(i,1)}
  }

  // Update flak puffs & explosions
  for(let i=flakPuffs.length-1;i>=0;i--){
    const e=flakPuffs[i];e.age+=dt;
    const t=e.age/e.duration;
    if(t>=1){scene.remove(e.group);scene.remove(e.light);flakPuffs.splice(i,1);continue}
    e.light.intensity=Math.max(0,e.light.intensity-dt*4);
    e.group.children.forEach(c=>{
      if(c.material){
        c.material.opacity=Math.max(0,(1-t)*(c.userData.vel?1:0.8));
        if(c.userData.vel)c.position.addScaledVector(c.userData.vel,dt);
        c.scale.setScalar(1+t*1.5);
      }
    });
  }

  // Update debris
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];d.age+=dt;
    d.vel.y-=40*dt;
    d.mesh.position.addScaledVector(d.vel,dt);
    d.mesh.rotation.x+=d.rotVel.x*dt;
    d.mesh.rotation.z+=d.rotVel.z*dt;
    if(d.isFire)d.mesh.material.opacity=Math.max(0,1-d.age/2.5);
    if(d.mesh.position.y<0||d.age>6){scene.remove(d.mesh);debris.splice(i,1)}
  }

  // Clouds drift
  clouds.forEach(c=>{c.position.x+=2*dt;if(c.position.x>800)c.position.x=-800});

  renderer.render(scene,camera);
}

function startGame(){
  score=0;spawnInterval=1.8;spawnTimer=0;
  scoreEl.textContent='Score: 0';
  shells.forEach(s=>scene.remove(s.mesh));shells.length=0;
  planes.forEach(p=>scene.remove(p.mesh));planes.length=0;
  flakPuffs.forEach(e=>{scene.remove(e.group);scene.remove(e.light)});flakPuffs.length=0;
  debris.forEach(d=>scene.remove(d.mesh));debris.length=0;
  gameActive=true;lastTime=performance.now();
  renderer.domElement.requestPointerLock();
}

document.getElementById('start-screen').addEventListener('click',()=>{
  initAudio();
  document.getElementById('start-screen').style.display='none';
  startGame();
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

requestAnimationFrame(update);
</script>
</body>
</html>
