<script type="module">
import*as THREE from'three';

// ---- Audio ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
let gunBuffer=null,explosionBuffer=null;

async function initAudio(){
  if(!actx)actx=new AudioCtx();
  try{
    const [gunResp,expResp]=await Promise.all([
      fetch('cannon_fire.mp3'),fetch('distant_explosion.mp3')
    ]);
    gunBuffer=await actx.decodeAudioData(await gunResp.arrayBuffer());
    explosionBuffer=await actx.decodeAudioData(await expResp.arrayBuffer());
  }catch(e){console.warn('Audio samples failed to load, using procedural fallback',e)}
  // Load engine drone sample (distant formation hum)
  try{
    const eResp=await fetch('engine_drone.mp3');
    engineDroneBuf=await actx.decodeAudioData(await eResp.arrayBuffer());
  }catch(e){console.warn('Engine audio failed',e)}
  engineGain=actx.createGain();engineGain.gain.value=0;engineGain.connect(actx.destination);
  if(engineDroneBuf){
    const src=actx.createBufferSource();src.buffer=engineDroneBuf;src.loop=true;
    src.connect(engineGain);src.start();
  }
}
let engineGain=null,engineDroneBuf=null;

// Play a sample from the start (consistent sound)
function playFromStart(buffer,vol,duration){
  if(!actx||!buffer)return;
  const src=actx.createBufferSource();
  src.buffer=buffer;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+duration);
  src.connect(g);g.connect(actx.destination);
  src.start(actx.currentTime,0,duration);
}

// Play a random segment from a buffer (varied sound)
function playSample(buffer,vol,duration){
  if(!actx||!buffer)return;
  const src=actx.createBufferSource();
  src.buffer=buffer;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+duration);
  src.connect(g);g.connect(actx.destination);
  const maxStart=Math.max(0,buffer.duration-duration-0.1);
  const offset=Math.random()*maxStart;
  src.start(actx.currentTime,offset,duration);
}

// Master volume for all sounds
const MASTER_VOL=0.35;

// Utility: create filtered noise buffer
function noiseBuf(dur,decay,curve){
  const len=Math.floor(actx.sampleRate*dur);
  const buf=actx.createBuffer(1,len,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++){
    const t=i/len;
    d[i]=(Math.random()*2-1)*Math.pow(1-t,curve||1.5);
  }
  return buf;
}

function playCannonFire(){
  if(!actx)return;
  if(gunBuffer){playFromStart(gunBuffer,2.0,0.5);return}
  // Procedural fallback
  const t=actx.currentTime;
  const master=actx.createGain();
  master.gain.value=MASTER_VOL;master.connect(actx.destination);
  const thumpBuf=noiseBuf(0.6,1,1.5);
  const thump=actx.createBufferSource();thump.buffer=thumpBuf;
  const thumpLP=actx.createBiquadFilter();thumpLP.type='lowpass';thumpLP.frequency.setValueAtTime(80,t);thumpLP.frequency.exponentialRampToValueAtTime(30,t+0.5);thumpLP.Q.value=0.8;
  const thumpG=actx.createGain();thumpG.gain.setValueAtTime(0.8,t);thumpG.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  thump.connect(thumpLP);thumpLP.connect(thumpG);thumpG.connect(master);thump.start(t);
}

function playShellExplode(){
  if(!actx)return;
  if(explosionBuffer){playSample(explosionBuffer,0.2,0.6);return}
  // Procedural fallback
  const t=actx.currentTime;
  const master=actx.createGain();
  master.gain.value=MASTER_VOL*0.3;master.connect(actx.destination);
  const popBuf=noiseBuf(0.25,1,2.5);
  const pop=actx.createBufferSource();pop.buffer=popBuf;
  const popBP=actx.createBiquadFilter();popBP.type='bandpass';popBP.frequency.value=300;popBP.Q.value=0.5;
  const popG=actx.createGain();popG.gain.setValueAtTime(0.4,t);popG.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  pop.connect(popBP);popBP.connect(popG);popG.connect(master);pop.start(t);
}

function playPlaneExplode(){
  if(!actx)return;
  if(explosionBuffer){playSample(explosionBuffer,0.4,1.0);return}
  const t=actx.currentTime;
  const master=actx.createGain();
  master.gain.value=MASTER_VOL*0.5;master.connect(actx.destination);
  const rumbleBuf=noiseBuf(0.8,1,0.8);
  const rumble=actx.createBufferSource();rumble.buffer=rumbleBuf;
  const rumbleLP=actx.createBiquadFilter();rumbleLP.type='lowpass';rumbleLP.frequency.setValueAtTime(200,t);rumbleLP.frequency.exponentialRampToValueAtTime(60,t+0.7);
  const rumbleG=actx.createGain();rumbleG.gain.setValueAtTime(0.6,t);rumbleG.gain.exponentialRampToValueAtTime(0.001,t+0.8);
  rumble.connect(rumbleLP);rumbleLP.connect(rumbleG);rumbleG.connect(master);rumble.start(t);
}

function playSplash(){
  if(!actx)return;
  if(explosionBuffer){playSample(explosionBuffer,0.15,0.5);return}
  const t=actx.currentTime;
  const master=actx.createGain();
  master.gain.value=MASTER_VOL*0.3;master.connect(actx.destination);
  const splashBuf=noiseBuf(0.3,1,1.5);
  const splash=actx.createBufferSource();splash.buffer=splashBuf;
  const splashLP=actx.createBiquadFilter();splashLP.type='lowpass';splashLP.frequency.setValueAtTime(300,t);splashLP.frequency.exponentialRampToValueAtTime(80,t+0.3);
  const splashG=actx.createGain();splashG.gain.setValueAtTime(0.4,t);splashG.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  splash.connect(splashLP);splashLP.connect(splashG);splashG.connect(master);splash.start(t);
}

// ---- Engine ----

function createSky(){

  grd.addColorStop(0,'#2a3a6a');
  grd.addColorStop(0.25,'#3a4a7e');
  grd.addColorStop(0.45,'#6a3070');
  grd.addColorStop(0.6,'#c84b31');
  grd.addColorStop(0.72,'#f4a261');
  grd.addColorStop(0.85,'#e9c46a');
  grd.addColorStop(1,'#264653');
  ctx.fillStyle=grd;ctx.fillRect(0,0,512,512);
  const tex=new THREE.CanvasTexture(c);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,32),new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide})));
}
createSky();

// ---- Ship (player is on a warship) ----
const shipMat=new THREE.MeshLambertMaterial({color:0x555560});
const shipDeckMat=new THREE.MeshLambertMaterial({color:0x606068});
// Hull — long tapered shape
const hullShape=new THREE.Group();
const hullMain=new THREE.Mesh(new THREE.BoxGeometry(18,6,80),shipMat);
hullMain.position.set(0,2,0);hullShape.add(hullMain);
// Bow taper
const bowGeo=new THREE.CylinderGeometry(0,9,20,4,1);
const bow=new THREE.Mesh(bowGeo,shipMat);
bow.rotation.x=Math.PI/2;bow.rotation.y=Math.PI/4;bow.position.set(0,2,-50);hullShape.add(bow);
// Stern
const stern=new THREE.Mesh(new THREE.BoxGeometry(16,6,8),shipMat);
stern.position.set(0,2,44);hullShape.add(stern);
// Deck
const deck=new THREE.Mesh(new THREE.BoxGeometry(20,0.3,90),shipDeckMat);
deck.position.set(0,5.1,0);hullShape.add(deck);

bridgeTop.position.set(0,16,40);hullShape.add(bridgeTop);

funnel.position.set(0,14,50);hullShape.add(funnel);
// Gun turret bases (other AA positions)
for(const zz of[-20,35]){
  const tBase=new THREE.Mesh(new THREE.CylinderGeometry(2.5,3,1.5,12),shipMat);
  tBase.position.set(0,5.8,zz);hullShape.add(tBase);
}
hullShape.position.set(0,-5.5,0);
scene.add(hullShape);

// ---- Lighting ----
scene.add(new THREE.AmbientLight(0xffa070,.6));
const dirLight=new THREE.DirectionalLight(0xffe0b0,1.2);
dirLight.position.set(-50,80,-30);scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0xccaa88,0x443322,.4));

// ---- Clouds ----
const clouds=[];
function makeCloud(x,y,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffeedd,transparent:true,opacity:.35});
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(8+Math.random()*12,8,6),mat);
    s.position.set(Math.random()*20-10,Math.random()*4,Math.random()*20-10);
    s.scale.y=.4+Math.random()*.3;g.add(s);
  }
  g.position.set(x,y,z);scene.add(g);clouds.push(g);
}
for(let i=0;i<25;i++)makeCloud(Math.random()*1600-800,60+Math.random()*120,Math.random()*1600-800);

// ---- QUAD 40mm BOFORS MOUNT ----
const cannonGroup=new THREE.Group();
const cannonPivot=new THREE.Group();

// Circular rotating platform base
const baseMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const baseBottom=new THREE.Mesh(new THREE.CylinderGeometry(5.5,6,1.2,20),baseMat);
baseBottom.position.y=0.6;cannonGroup.add(baseBottom);
// Pedestal
const pedestal=new THREE.Mesh(new THREE.CylinderGeometry(4,5,2,16),new THREE.MeshLambertMaterial({color:0x444444}));
pedestal.position.y=1.8;cannonGroup.add(pedestal);
// Turret ring
const tRing=new THREE.Mesh(new THREE.CylinderGeometry(3.8,4,0.6,20),new THREE.MeshLambertMaterial({color:0x4a4a4a}));
tRing.position.y=2.9;cannonGroup.add(tRing);

// Main turret housing - below the gunner, not visible from first person
// (removed - was blocking center view)

// Armored shield - side plates only (player sits in the middle, looking through the sight)
const shieldMat=new THREE.MeshLambertMaterial({color:0x777f8c});
// Left shield plate (around left barrel pair)
const shieldL=new THREE.Mesh(new THREE.BoxGeometry(4,3.5,5.5),shieldMat);
shieldL.position.set(-15.5,0,0.5);cannonPivot.add(shieldL);
// Right shield plate (around right barrel pair)
const shieldR=new THREE.Mesh(new THREE.BoxGeometry(4,3.5,5.5),shieldMat);
shieldR.position.set(15.5,0,0.5);cannonPivot.add(shieldR);

// Four barrels in 2x2 grid — WIDE separation so they're clearly four distinct tubes
const barrelMat=new THREE.MeshLambertMaterial({color:0x555555});
const barrelPositions=[
  {x:-14.8,y:0},   // left-outer
  {x:-13.2,y:0},   // left-inner
  {x:13.2,y:0},    // right-inner
  {x:14.8,y:0},    // right-outer
];
const barrels=[];
const barrelFlashes=[];
const barrelRestZ=-2;

for(let i=0;i<4;i++){
  const bp=barrelPositions[i];
  const bGroup=new THREE.Group();

  // Main barrel tube
  const tube=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,8,8),barrelMat);
  tube.rotation.x=Math.PI/2;tube.position.set(0,0,-4);bGroup.add(tube);

  // Flash suppressor at muzzle — flares outward at the tip
  const tip=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.35,0.8,8),new THREE.MeshLambertMaterial({color:0x3a3a3a}));
  tip.rotation.x=Math.PI/2;tip.position.set(0,0,-8.2);bGroup.add(tip);

  // Barrel jacket/rib section near breech — thicker, closer to gunner
  const sleeve=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,2.5,8),barrelMat);
  sleeve.rotation.x=Math.PI/2;sleeve.position.set(0,0,0.5);bGroup.add(sleeve);

  bGroup.position.set(bp.x,bp.y,barrelRestZ);
  cannonPivot.add(bGroup);
  barrels.push({group:bGroup,restZ:barrelRestZ,recoil:0});

  // Muzzle flash per barrel
  const flash=new THREE.Mesh(new THREE.SphereGeometry(0.7,6,6),new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0}));
  flash.position.set(bp.x,bp.y,barrelRestZ-8.8);
  cannonPivot.add(flash);
  barrelFlashes.push(flash);
}

// ---- Spider Web Ring Sight (WW2 Bofors) ----
// Triangular frame posts rising from between the barrels
const sightWireMat=new THREE.MeshBasicMaterial({color:0x222222});
const sightLineMat=new THREE.LineBasicMaterial({color:0x222222,transparent:true,opacity:0.7});
const sightZ=-6;
const sightY=2.0;
const sightR=1.4; // outer ring radius

// Support posts — thin triangular frame
const postGeo=new THREE.CylinderGeometry(0.04,0.04,2,4);
const postL=new THREE.Mesh(postGeo,sightWireMat);
postL.position.set(-0.6,1.0,sightZ);cannonPivot.add(postL);
const postR=new THREE.Mesh(postGeo,sightWireMat);
postR.position.set(0.6,1.0,sightZ);cannonPivot.add(postR);
// Cross brace
const brace=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,1.2,4),sightWireMat);
brace.rotation.z=Math.PI/2;brace.position.set(0,1.5,sightZ);cannonPivot.add(brace);

// Concentric rings (outer ring + 3 inner rings)
const ringRadii=[sightR, sightR*0.7, sightR*0.45, sightR*0.2];
for(const r of ringRadii){
  const ringTorus=new THREE.Mesh(new THREE.TorusGeometry(r,0.02,6,32),sightWireMat);
  ringTorus.position.set(0,sightY,sightZ);
  cannonPivot.add(ringTorus);
}

// Radial spokes — 12 lines from center to outer ring
const spokeCount=12;
for(let i=0;i<spokeCount;i++){
  const angle=(i/spokeCount)*Math.PI*2;
  const pts=[
    new THREE.Vector3(Math.cos(angle)*0.15,sightY+Math.sin(angle)*0.15,sightZ),
    new THREE.Vector3(Math.cos(angle)*sightR,sightY+Math.sin(angle)*sightR,sightZ)
  ];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const spoke=new THREE.Line(geo,sightLineMat);
  cannonPivot.add(spoke);
}

// Center aiming ring (hole in the middle, like a real Bofors sight)
const bead=new THREE.Mesh(new THREE.TorusGeometry(0.12,0.02,6,16),new THREE.MeshBasicMaterial({color:0x222222}));
bead.position.set(0,sightY,sightZ);cannonPivot.add(bead);

// Ammo feed boxes on sides
const feedMat=new THREE.MeshLambertMaterial({color:0x444444});
const feedL=new THREE.Mesh(new THREE.BoxGeometry(0.6,1.8,2.5),feedMat);
feedL.position.set(-12,0,1.5);cannonPivot.add(feedL);
const feedR=new THREE.Mesh(new THREE.BoxGeometry(0.6,1.8,2.5),feedMat);
feedR.position.set(12,0,1.5);cannonPivot.add(feedR);

// Gunner seats
const seatMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const seatL2=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.8,1.5),seatMat);
seatL2.position.set(-13,-0.6,0.5);cannonPivot.add(seatL2);
const seatR2=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.8,1.5),seatMat);
seatR2.position.set(13,-0.6,0.5);cannonPivot.add(seatR2);

cannonPivot.position.y=2.5;
cannonGroup.add(cannonPivot);
cannonGroup.position.set(0,-6.5,-7);
camera.add(cannonGroup);
scene.add(camera);

// ---- Game State ----
let mouseDown=false,currentBarrel=0,fireTimer=0,lastFireTime=0;
const FIRE_RATE=0.5;
let score=0,gameActive=false;
const shells=[],planes=[],flakPuffs=[],debris=[],fallingPlanes=[],splashes=[],orphanSmoke=[];
let aimPitch=0.3,aimYaw=0;
const SHELL_SPEED=180,BLAST_RADIUS=18;
const _q=new THREE.Quaternion();

const scoreEl=document.getElementById('score');
const waveInfoEl=document.getElementById('wave-info');

// ---- Raid Wave System (tactical formations) ----
let waveTimer=0,waveActive=false;
let wavePause=3; // initial pause before first wave
let waveNumber=0;
let currentWave=null;
let waveSpawnIndex=0;
let waveSpawnTimer=0;
let lastWaveAngle=Math.random()*Math.PI*2;

function pickDirection(){
  lastWaveAngle+=Math.PI/2+Math.random()*Math.PI/2;
  return lastWaveAngle;
}

function generateWave(){
  const types=['high_bombing','low_torpedo','medium_strafing','mixed'];
  const type=types[Math.floor(Math.random()*types.length)];
  const angle=pickDirection();
  const dist=1200;
  // Offset the flight path so planes pass NEAR the player, not directly over
  // Random lateral offset: -300 to +300 units from center
  const passOffset=(Math.random()-0.5)*600;
  const baseX=Math.cos(angle)*dist+Math.sin(angle)*passOffset;
  const baseZ=Math.sin(angle)*dist-Math.cos(angle)*passOffset;
  const dx=-Math.cos(angle), dz=-Math.sin(angle);
  const perpX=-dz, perpZ=dx;
  const wave={type,planes:[]};
  let waveName='';

  // Raid size: small 15-25, medium 30-50, large 60-100
  const sizeRoll=Math.random();
  const raidSize=sizeRoll<0.5?15+Math.floor(Math.random()*11):sizeRoll<0.85?30+Math.floor(Math.random()*21):60+Math.floor(Math.random()*41);

  if(type==='high_bombing'){
    waveName='High Altitude Bombing Run';
    const alt=180+Math.random()*80;
    const speed=20+Math.random()*8;
    // Box formation: rows x cols
    const cols=Math.min(12,Math.ceil(Math.sqrt(raidSize*1.5)));
    const rows=Math.ceil(raidSize/cols);
    let idx=0;
    for(let r=0;r<rows&&idx<raidSize;r++){
      for(let c=0;c<cols&&idx<raidSize;c++){
        const offX=perpX*(c-(cols-1)/2)*18;
        const offZ=r*(-20);
        wave.planes.push({x:baseX+offX+dx*offZ+(Math.random()-0.5)*4,z:baseZ+perpZ*(c-(cols-1)/2)*18+dz*offZ+(Math.random()-0.5)*4,
          alt:alt+(Math.random()-0.5)*8,speed:speed+(Math.random()-0.5)*3,dx,dz,hp:3,type:'bomber'});
        idx++;
      }
    }
  }else if(type==='low_torpedo'){
    waveName='Low Altitude Torpedo Run';
    const alt=30+Math.random()*20;
    const speed=50+Math.random()*15;
    // Spread in loose line-abreast waves
    const cols=Math.min(8,Math.ceil(raidSize/2));
    let idx=0;
    for(let r=0;idx<raidSize;r++){
      for(let c=0;c<cols&&idx<raidSize;c++){
        wave.planes.push({x:baseX+perpX*(c-(cols-1)/2)*22+dx*r*(-25)+(Math.random()-0.5)*5,
          z:baseZ+perpZ*(c-(cols-1)/2)*22+dz*r*(-25)+(Math.random()-0.5)*5,
          alt:alt+(Math.random()-0.5)*6,speed:speed+(Math.random()-0.5)*5,dx,dz,hp:1,type:'fighter'});
        idx++;
      }
    }
  }else if(type==='medium_strafing'){
    waveName='Medium Altitude Strafing Run';
    const alt=70+Math.random()*50;
    const speed=38+Math.random()*12;
    // Pairs in echelon
    for(let i=0;i<raidSize;i++){
      const pair=Math.floor(i/2);
      const side=i%2===0?1:-1;
      wave.planes.push({x:baseX+perpX*side*12+dx*pair*(-22)+(Math.random()-0.5)*4,
        z:baseZ+perpZ*side*12+dz*pair*(-22)+(Math.random()-0.5)*4,
        alt:alt+(Math.random()-0.5)*8,speed:speed+(Math.random()-0.5)*4,dx,dz,hp:2,type:'fighter'});
    }
  }else{
    waveName='Mixed Formation';
    const alt=100+Math.random()*60;
    const bomberCount=Math.ceil(raidSize*0.6);
    const fighterCount=raidSize-bomberCount;
    const bomberSpeed=22+Math.random()*6;
    // Bombers in box
    const cols=Math.min(10,Math.ceil(Math.sqrt(bomberCount*1.5)));
    let idx=0;
    for(let r=0;idx<bomberCount;r++){
      for(let c=0;c<cols&&idx<bomberCount;c++){
        const offX=perpX*(c-(cols-1)/2)*20;
        const offZ=r*(-20);
        wave.planes.push({x:baseX+offX+dx*offZ+(Math.random()-0.5)*3,z:baseZ+perpZ*(c-(cols-1)/2)*20+dz*offZ+(Math.random()-0.5)*3,
          alt:alt+(Math.random()-0.5)*6,speed:bomberSpeed+(Math.random()-0.5)*3,dx,dz,hp:3,type:'bomber'});
        idx++;
      }
    }
    // Fighters flanking
    for(let i=0;i<fighterCount;i++){
      const side=i%2===0?1:-1;
      const rank=Math.ceil((i+1)/2);
      wave.planes.push({x:baseX+perpX*side*(rank*20+cols*10)+dx*(-30)+(Math.random()-0.5)*5,
        z:baseZ+perpZ*side*(rank*20+cols*10)+dz*(-30)+(Math.random()-0.5)*5,
        alt:alt+10+(Math.random()-0.5)*10,speed:bomberSpeed+15+Math.random()*8,dx,dz,hp:1,type:'fighter'});
    }
  }
  wave.name=waveName;
  return wave;
}

function spawnFormationPlane(p){
  const mesh=p.type==='bomber'?createBomber():createFighter();
  const vx=p.dx*p.speed, vz=p.dz*p.speed;
  mesh.position.set(p.x,p.alt,p.z);
  mesh.lookAt(p.x+vx,p.alt,p.z+vz);
  const s=p.alt>150?0.7:p.alt>100?0.85:1;
  mesh.scale.setScalar(s);
  scene.add(mesh);
  planes.push({mesh,vx,vz,alt:p.alt,speed:p.speed,hp:p.hp,maxHp:p.hp,smoking:false,smokeTrail:[]});
}

// ---- Plane factories ----
function createBomber(){
  const g=new THREE.Group();
  const bodyMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
  const wingMat=new THREE.MeshLambertMaterial({color:0x404040});
  // Fuselage — longer cylinder for rounded shape
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.7,20,8),bodyMat);
  body.rotation.x=Math.PI/2;g.add(body);
  // Nose cone
  const nose=new THREE.Mesh(new THREE.ConeGeometry(0.8,3,8),bodyMat);
  nose.rotation.x=-Math.PI/2;nose.position.z=11.5;g.add(nose);
  // Tail taper
  const tailCone=new THREE.Mesh(new THREE.ConeGeometry(0.7,4,8),bodyMat);
  tailCone.rotation.x=Math.PI/2;tailCone.position.z=-12;g.add(tailCone);
  // Wings — tapered (wider at root, narrower at tips)
  for(const side of[-1,1]){
    const wingGeo=new THREE.BufferGeometry();
    const hw=12;// half wingspan
    const v=new Float32Array([0,.3,2, side*hw,.3,0.5, side*hw,.3,-0.5, 0,.3,-1.5]);
    const idx=side>0?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    wingGeo.setAttribute('position',new THREE.BufferAttribute(v,3));
    wingGeo.setIndex(idx);wingGeo.computeVertexNormals();
    g.add(new THREE.Mesh(wingGeo,wingMat));
  }
  // Horizontal tail — tapered
  for(const side of[-1,1]){
    const tGeo=new THREE.BufferGeometry();
    const v=new Float32Array([0,.4,-8, side*4,.4,-9.5, side*4,.4,-10.5, 0,.4,-11]);
    const idx=side>0?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    tGeo.setAttribute('position',new THREE.BufferAttribute(v,3));
    tGeo.setIndex(idx);tGeo.computeVertexNormals();
    g.add(new THREE.Mesh(tGeo,wingMat));
  }
  // Vertical tail — swept
  const vtGeo=new THREE.BufferGeometry();
  const vt=new Float32Array([0,0.5,-9, 0,3.5,-11, 0,3,-12, 0,0.5,-12]);
  vtGeo.setAttribute('position',new THREE.BufferAttribute(vt,3));
  vtGeo.setIndex([0,1,2,0,2,3]);vtGeo.computeVertexNormals();
  const vtMesh=new THREE.Mesh(vtGeo,bodyMat);
  g.add(vtMesh);
  // Engines
  for(let s of[-6,-3,3,6]){
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,2.5,6),new THREE.MeshLambertMaterial({color:0x444444}));
    eng.rotation.x=Math.PI/2;eng.position.set(s,-.3,2);g.add(eng);
  }
  return g;
}
function createFighter(){
  const g=new THREE.Group();
  const bodyMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
  const wingMat=new THREE.MeshLambertMaterial({color:0x404040});
  // Fuselage — longer cylinder
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.4,10,8),bodyMat);
  body.rotation.x=Math.PI/2;g.add(body);
  // Nose cone (spinner)
  const nose=new THREE.Mesh(new THREE.ConeGeometry(0.5,2.5,8),bodyMat);
  nose.rotation.x=-Math.PI/2;nose.position.z=6.2;g.add(nose);
  // Tail taper
  const tailCone=new THREE.Mesh(new THREE.ConeGeometry(0.4,3,8),bodyMat);
  tailCone.rotation.x=Math.PI/2;tailCone.position.z=-6.5;g.add(tailCone);
  // Wings — tapered
  for(const side of[-1,1]){
    const wGeo=new THREE.BufferGeometry();
    const hw=6;
    const v=new Float32Array([0,.1,1.2, side*hw,.1,0.2, side*hw,.1,-0.3, 0,.1,-1]);
    const idx=side>0?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    wGeo.setAttribute('position',new THREE.BufferAttribute(v,3));
    wGeo.setIndex(idx);wGeo.computeVertexNormals();
    g.add(new THREE.Mesh(wGeo,wingMat));
  }
  // Horizontal tail — tapered
  for(const side of[-1,1]){
    const tGeo=new THREE.BufferGeometry();
    const v=new Float32Array([0,.2,-5, side*2.5,.2,-6, side*2.5,.2,-6.8, 0,.2,-7]);
    const idx=side>0?[0,1,2,0,2,3]:[0,2,1,0,3,2];
    tGeo.setAttribute('position',new THREE.BufferAttribute(v,3));
    tGeo.setIndex(idx);tGeo.computeVertexNormals();
    g.add(new THREE.Mesh(tGeo,wingMat));
  }
  // Vertical tail — swept
  const vtGeo=new THREE.BufferGeometry();
  const vt=new Float32Array([0,0.3,-5.5, 0,2,-7, 0,1.5,-7.5, 0,0.3,-7]);
  vtGeo.setAttribute('position',new THREE.BufferAttribute(vt,3));
  vtGeo.setIndex([0,1,2,0,2,3]);vtGeo.computeVertexNormals();
  g.add(new THREE.Mesh(vtGeo,bodyMat));
  // Engine
  const eng=new THREE.Mesh(new THREE.CylinderGeometry(.4,.4,1.8,6),new THREE.MeshLambertMaterial({color:0x444444}));
  eng.rotation.x=Math.PI/2;eng.position.set(0,-.2,3);g.add(eng);
  return g;
}

// ---- Shell: visible traveling projectile ----
function fireShell(){
  // Safety interlock: don't fire into own ship superstructure
  // Ship bridge is behind player (positive Z). Block if aimed low and backward.
  const aimDirCheck=new THREE.Vector3(0,0,-1);
  aimDirCheck.applyQuaternion(camera.quaternion);
  // If aimed downward (y < -0.1) and toward the ship deck area (within ~30 units of origin at y<5)
  if(aimPitch<0.08&&Math.abs(aimDirCheck.z)>0.5){
    // Check if the aim ray would hit the ship deck (y~5, within x±10, z±50)
    const t=(5-camera.position.y)/aimDirCheck.y;
    if(t>0){
      const hitX=camera.position.x+aimDirCheck.x*t;
      const hitZ=camera.position.z+aimDirCheck.z*t;
      if(Math.abs(hitX)<12&&hitZ>-55&&hitZ<50)return;
    }
  }
  playCannonFire();
  const bi=currentBarrel;
  currentBarrel=(currentBarrel+1)%4;
  barrels[bi].recoil=0.6;
  barrelFlashes[bi].material.opacity=1;
  setTimeout(()=>{barrelFlashes[bi].material.opacity=0},60);

  const bp=barrelPositions[bi];
  const flashLight=new THREE.PointLight(0xffaa00,4,20);
  const worldPos=new THREE.Vector3();
  barrelFlashes[bi].getWorldPosition(worldPos);
  flashLight.position.copy(worldPos);
  scene.add(flashLight);
  setTimeout(()=>scene.remove(flashLight),80);

  const aimDir=new THREE.Vector3();
  // Where the sight is aiming (through the red bead)
  const beadWorld=new THREE.Vector3();
  bead.getWorldPosition(beadWorld);
  aimDir.subVectors(beadWorld,camera.position).normalize();
  // Add slight random spread for realism
  aimDir.x+=(Math.random()-0.5)*0.03;
  aimDir.y+=(Math.random()-0.5)*0.03;
  aimDir.z+=(Math.random()-0.5)*0.03;
  aimDir.normalize();

  // Launch direction: along the barrel's physical axis
  const barrelDir=new THREE.Vector3(0,0,-1);
  barrels[bi].group.getWorldQuaternion(_q);
  barrelDir.applyQuaternion(_q).normalize();

  const mesh=new THREE.Mesh(new THREE.SphereGeometry(.25,4,4),new THREE.MeshBasicMaterial({color:0xffcc00}));
  const muzzlePos=new THREE.Vector3();
  barrelFlashes[bi].getWorldPosition(muzzlePos);
  mesh.position.copy(muzzlePos);
  const tail=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,2,4),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.6}));
  tail.lookAt(barrelDir);tail.rotateX(Math.PI/2);
  mesh.add(tail);
  scene.add(mesh);
  shells.push({mesh,dir:barrelDir.clone(),aimDir:aimDir.clone(),speed:SHELL_SPEED,traveled:0,alive:true});
}

// ---- Flak Burst ----
function createFlakBurst(pos){
  playShellExplode();
  const g=new THREE.Group();
  for(let i=0;i<14;i++){
    const grey=0x1a+Math.floor(Math.random()*0x22);
    const shade=(grey<<16)|(grey<<8)|grey;
    const puff=new THREE.Mesh(
      new THREE.SphereGeometry(0.8+Math.random()*1.5,6,6),
      new THREE.MeshBasicMaterial({color:shade,transparent:true,opacity:0.85})
    );
    const offset=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*4);
    puff.position.copy(offset);
    puff.userData.vel=offset.clone().normalize().multiplyScalar(1.5+Math.random()*2);
    g.add(puff);
  }
  const flash=new THREE.Mesh(
    new THREE.SphereGeometry(1,6,6),
    new THREE.MeshBasicMaterial({color:0x888888,transparent:true,opacity:0.9})
  );
  flash.userData.isFlash=true;
  g.add(flash);
  g.position.copy(pos);scene.add(g);
  const light=new THREE.PointLight(0x888888,2,30);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:g,light,age:0,duration:15+Math.random()*10});
}

function checkFlakDamage(pos){
  for(let j=planes.length-1;j>=0;j--){
    const p=planes[j];
    const dist=p.mesh.position.distanceTo(pos);
    if(dist<BLAST_RADIUS){
      p.hp--;
      if(p.hp>0&&!p.smoking)p.smoking=true;
      if(p.hp<=0){
        score++;
        scoreEl.textContent='Score: '+score;
        // Don't remove — convert to falling wreckage
        startPlaneCrash(p,j);
      }
    }
  }
}

// ---- Plane Crash System (planes fall, tumble, splash into ocean) ----
function startPlaneCrash(p,idx){
  playPlaneExplode();
  // Transfer existing smoke trail to orphan list (fades naturally)
  p.smokeTrail.forEach(s=>orphanSmoke.push(s));
  planes.splice(idx,1);

  // Initial explosion effect at the plane
  const pos=p.mesh.position.clone();
  const fireGroup=new THREE.Group();
  for(let i=0;i<10;i++){
    const color=[0xff4400,0xff8800,0xffcc00][Math.floor(Math.random()*3)];
    const ball=new THREE.Mesh(
      new THREE.SphereGeometry(0.8+Math.random()*2,5,5),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:1})
    );
    const d=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*3);
    ball.position.copy(d);
    ball.userData.vel=d.clone().normalize().multiplyScalar(10+Math.random()*15);
    fireGroup.add(ball);
  }
  fireGroup.position.copy(pos);scene.add(fireGroup);
  const light=new THREE.PointLight(0xff4400,6,60);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:fireGroup,light,age:0,duration:1.5});

  // Make the plane mesh look damaged — change color to dark/burning
  p.mesh.traverse(child=>{
    if(child.isMesh&&child.material){
      child.material=child.material.clone();
      child.material.color.setHex(0x332211);
    }
  });

  // Add fire effect attached to the plane
  const fireMeshes=[];
  for(let i=0;i<4;i++){
    const fire=new THREE.Mesh(
      new THREE.SphereGeometry(0.8+Math.random()*1.2,5,5),
      new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.8})
    );
    fire.position.set((Math.random()-0.5)*4,Math.random()*2,(Math.random()-0.5)*4);
    p.mesh.add(fire);
    fireMeshes.push(fire);
  }

  // Varied crash behaviors:
  // 0 = gradual descent (maintains most momentum, shallow dive)
  // 1 = spiral (keeps speed but spins)
  // 2 = nose dive (loses lift, drops steeply)
  const crashType=Math.random();
  let keepMomentum, initVy, tumbleX, tumbleZ, tumbleY;
  if(crashType<0.4){
    // Gradual descent — keeps flying but slowly loses altitude
    keepMomentum=0.9+Math.random()*0.1;
    initVy=-1-Math.random()*3;
    tumbleX=(Math.random()-0.5)*0.5;
    tumbleZ=(Math.random()-0.5)*0.3;
    tumbleY=(Math.random()-0.5)*0.3;
  }else if(crashType<0.7){
    // Spiral — spins while maintaining some forward speed
    keepMomentum=0.6+Math.random()*0.2;
    initVy=-2-Math.random()*5;
    tumbleX=(Math.random()-0.5)*4;
    tumbleZ=(Math.random()-0.5)*4;
    tumbleY=2+Math.random()*3;
  }else{
    // Nose dive — steep drop
    keepMomentum=0.3+Math.random()*0.2;
    initVy=-8-Math.random()*8;
    tumbleX=(Math.random()-0.5)*2;
    tumbleZ=(Math.random()-0.5)*2;
    tumbleY=(Math.random()-0.5)*1;
  }

  fallingPlanes.push({
    mesh:p.mesh,
    vx:p.vx*keepMomentum,
    vz:p.vz*keepMomentum,
    vy:initVy,
    rotX:tumbleX,
    rotZ:tumbleZ,
    rotY:tumbleY,
    fireMeshes,
    smokeTimer:0,
    smokeTrail:[]
  });
}

// ---- Splash/Impact effect when wreckage hits ocean ----
function createSplash(pos){
  playSplash();
  const g=new THREE.Group();

  for(let i=0;i<12;i++){

    spray.userData.vel=new THREE.Vector3(Math.cos(angle)*speed,10+Math.random()*15,Math.sin(angle)*speed);
    g.add(spray);

document.addEventListener('mousemove',e=>{

  aimYaw+=e.movementX*.002;
  aimPitch-=e.movementY*.002;

});
document.addEventListener('mousedown',e=>{

    const now=performance.now()/1000;

  }
});
document.addEventListener('mouseup',e=>{

// ---- Game loop ----
let lastTime=0;
function update(time){
  requestAnimationFrame(update);
  if(!gameActive){renderer.render(scene,camera);return}
  const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;

  // Camera
  camera.rotation.set(0,0,0);
  camera.rotateY(-aimYaw);
  camera.rotateX(aimPitch);

  cannonPivot.rotation.set(0,0,0);

  // Auto-fire while holding mouse
  if(mouseDown){
    fireTimer+=dt;
    while(fireTimer>=FIRE_RATE){
      fireTimer-=FIRE_RATE;
      fireShell();
    }
  }

  // Barrel recoil animation
  for(let i=0;i<4;i++){
    const b=barrels[i];
    if(b.recoil>0){
      b.recoil=Math.max(0,b.recoil-dt*4);
      b.group.position.z=b.restZ+b.recoil*0.5;
    }else{
      b.group.position.z=b.restZ;
    }
  }

  // ---- Wave spawning system (tactical formations) ----
  if(currentWave){
    waveSpawnTimer+=dt;
    if(waveSpawnTimer>=0.3&&waveSpawnIndex<currentWave.planes.length){
      waveSpawnTimer=0;
      spawnFormationPlane(currentWave.planes[waveSpawnIndex]);
      waveSpawnIndex++;
    }
    if(waveSpawnIndex>=currentWave.planes.length){
      currentWave=null;
      wavePause=5+Math.random()*5;
    }
  }else{
    wavePause-=dt;
    if(wavePause<=0){
      waveNumber++;
      currentWave=generateWave();
      waveSpawnIndex=0;
      waveSpawnTimer=0;
      waveInfoEl.textContent=currentWave.name.toUpperCase()+' — Wave '+waveNumber;
      waveInfoEl.style.opacity='1';
      setTimeout(()=>{waveInfoEl.style.opacity='0'},3000);
    }
  }

  // Update shells
  for(let i=shells.length-1;i>=0;i--){
    const s=shells[i];
    // Ballistic arc: gradually steer from barrel direction toward sight aim direction
    const steerRate=2.5*dt; // how fast the shell curves
    s.dir.lerp(s.aimDir,Math.min(steerRate,1)).normalize();
    s.mesh.position.addScaledVector(s.dir,s.speed*dt);
    // Orient the tracer tail along current direction
    if(s.mesh.children[0])s.mesh.children[0].lookAt(s.mesh.position.clone().add(s.dir));
    s.traveled+=s.speed*dt;
    let detonated=false;
    if(s.traveled>40){
      for(let j=0;j<planes.length;j++){
        if(planes[j].mesh.position.distanceTo(s.mesh.position)<18){
          detonated=true;break;
        }
      }
    }
    if(s.traveled>600)detonated=true;
    // Shell hits water
    if(s.mesh.position.y<=0){
      createSplash(s.mesh.position.clone());
      scene.remove(s.mesh);shells.splice(i,1);
      continue;
    }
    if(detonated){
      const burstPos=s.mesh.position.clone();
      createFlakBurst(burstPos);
      checkFlakDamage(burstPos);
      scene.remove(s.mesh);shells.splice(i,1);
    }
  }

  // Update active planes
  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.z+=p.vz*dt;
    // Smoke trail for damaged planes
    if(p.smoking){
      if(!p._smokeTimer)p._smokeTimer=0;
      p._smokeTimer+=dt;
      if(p._smokeTimer>0.08){
        p._smokeTimer=0;
        const smoke=new THREE.Mesh(
          new THREE.SphereGeometry(0.8+Math.random()*1.2,4,4),
          new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:0.5})
        );
        smoke.position.copy(p.mesh.position);
        scene.add(smoke);
        p.smokeTrail.push(smoke);
        smoke.userData.age=0;
      }
      for(let si=p.smokeTrail.length-1;si>=0;si--){
        const sm=p.smokeTrail[si];
        sm.userData.age+=dt;
        sm.material.opacity=Math.max(0,0.5-sm.userData.age*0.15);
        sm.scale.setScalar(1+sm.userData.age*1.5);
        if(sm.userData.age>3){scene.remove(sm);p.smokeTrail.splice(si,1);}
      }
    }
    if(p.mesh.position.length()>1500){
      p.smokeTrail.forEach(s=>scene.remove(s));
      scene.remove(p.mesh);planes.splice(i,1);
    }
  }

  // Update engine drone volume based on nearest plane
  if(engineGain){
    let minDist=9999;
    for(const p of planes)minDist=Math.min(minDist,p.mesh.position.distanceTo(camera.position));
    for(const fp of fallingPlanes)minDist=Math.min(minDist,fp.mesh.position.distanceTo(camera.position));
    // Louder when closer: full volume at dist 50, silent at dist 800+
    const vol=Math.max(0,Math.min(0.25,0.25*(1-minDist/800)));
    engineGain.gain.value+=(vol-engineGain.gain.value)*0.05;
  }

  // Update falling/crashing planes
  for(let i=fallingPlanes.length-1;i>=0;i--){
    const fp=fallingPlanes[i];
    fp.vy-=6*dt; // gravity (gentle — planes have mass and drag)
    fp.mesh.position.x+=fp.vx*dt;
    fp.mesh.position.y+=fp.vy*dt;
    fp.mesh.position.z+=fp.vz*dt;
    fp.mesh.rotation.x+=fp.rotX*dt;
    fp.mesh.rotation.z+=fp.rotZ*dt;
    fp.mesh.rotation.y+=fp.rotY*dt;

    // Smoke trail while falling
    fp.smokeTimer+=dt;
    if(fp.smokeTimer>0.06){
      fp.smokeTimer=0;
      const smoke=new THREE.Mesh(
        new THREE.SphereGeometry(0.6+Math.random()*1,4,4),
        new THREE.MeshBasicMaterial({color:Math.random()>0.5?0x222222:0x553311,transparent:true,opacity:0.6})
      );
      smoke.position.copy(fp.mesh.position);
      scene.add(smoke);
      fp.smokeTrail.push(smoke);
      smoke.userData.age=0;
    }
    for(let si=fp.smokeTrail.length-1;si>=0;si--){
      const sm=fp.smokeTrail[si];
      sm.userData.age+=dt;
      sm.material.opacity=Math.max(0,0.6-sm.userData.age*0.2);
      sm.scale.setScalar(1+sm.userData.age*2);
      if(sm.userData.age>3){scene.remove(sm);fp.smokeTrail.splice(si,1);}
    }

    // Flicker fire
    fp.fireMeshes.forEach(f=>{
      f.material.opacity=0.5+Math.random()*0.5;
      f.scale.setScalar(0.8+Math.random()*0.6);
    });

    // Hit the ocean
    if(fp.mesh.position.y<=0){
      createSplash(fp.mesh.position);
      // Small debris burst at impact
      for(let d=0;d<6;d++){
        const size=0.3+Math.random()*1;
        const geo=new THREE.BoxGeometry(size,0.2,size*1.5);
        const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0x443322}));
        m.position.copy(fp.mesh.position);m.position.y=1;
        const vel=new THREE.Vector3((Math.random()-0.5)*20,5+Math.random()*10,(Math.random()-0.5)*20);
        scene.add(m);debris.push({mesh:m,vel,rotVel:new THREE.Vector3(Math.random()*4,Math.random()*4,Math.random()*4),age:0});
      }
      // Transfer smoke trail to orphan list so it keeps fading
      fp.smokeTrail.forEach(s=>orphanSmoke.push(s));
      scene.remove(fp.mesh);
      fallingPlanes.splice(i,1);
    }
    // Remove if too far away
    if(fp.mesh.position.length()>900){
      fp.smokeTrail.forEach(s=>scene.remove(s));
      scene.remove(fp.mesh);
      fallingPlanes.splice(i,1);
    }
  }

  // Update flak puffs & explosions
  for(let i=flakPuffs.length-1;i>=0;i--){
    const e=flakPuffs[i];e.age+=dt;
    const t=e.age/e.duration;
    if(t>=1){scene.remove(e.group);scene.remove(e.light);flakPuffs.splice(i,1);continue}
    e.light.intensity=Math.max(0,e.light.intensity-dt*8);
    e.group.children.forEach(c=>{
      if(c.material){
        if(c.userData.isFlash){
          c.material.opacity=Math.max(0,0.9-e.age*6);
        }else if(c.userData.vel){
          c.position.addScaledVector(c.userData.vel,dt*0.3);
          c.scale.setScalar(1+t*2.5);
          c.material.opacity=t<0.8?0.75:Math.max(0,0.75*(1-(t-0.8)/0.2));
        }
      }
    });
  }

  // Update debris
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];d.age+=dt;
    d.vel.y-=40*dt;
    d.mesh.position.addScaledVector(d.vel,dt);
    d.mesh.rotation.x+=d.rotVel.x*dt;
    d.mesh.rotation.z+=d.rotVel.z*dt;
    if(d.isFire)d.mesh.material.opacity=Math.max(0,1-d.age/2.5);
    if(d.mesh.position.y<0||d.age>6){scene.remove(d.mesh);debris.splice(i,1)}
  }

  // Update orphaned smoke (from crashed planes)
  for(let i=orphanSmoke.length-1;i>=0;i--){
    const sm=orphanSmoke[i];
    sm.userData.age+=dt;
    sm.material.opacity=Math.max(0,0.6-sm.userData.age*0.2);
    sm.scale.setScalar(1+sm.userData.age*2);
    if(sm.userData.age>3){scene.remove(sm);orphanSmoke.splice(i,1);}
  }

  // Update splashes
  for(let i=splashes.length-1;i>=0;i--){
    const sp=splashes[i];sp.age+=dt;
    const t=sp.age/sp.duration;
    if(t>=1){scene.remove(sp.group);splashes.splice(i,1);continue}
    sp.group.children.forEach(c=>{
      if(c.userData.isRing){
        c.scale.setScalar(1+sp.age*4);
        c.material.opacity=Math.max(0,0.6-t);
      }else if(c.userData.vel){
        c.userData.vel.y-=30*dt;
        c.position.addScaledVector(c.userData.vel,dt);
        c.material.opacity=Math.max(0,0.7-t);
      }
    });
  }

  // Clouds drift
  clouds.forEach(c=>{c.position.x+=2*dt;if(c.position.x>800)c.position.x=-800});

  renderer.render(scene,camera);
}

function startGame(){
  score=0;
  scoreEl.textContent='Score: 0';
  shells.forEach(s=>scene.remove(s.mesh));shells.length=0;
  planes.forEach(p=>{scene.remove(p.mesh);if(p.smokeTrail)p.smokeTrail.forEach(s=>scene.remove(s))});planes.length=0;
  flakPuffs.forEach(e=>{scene.remove(e.group);scene.remove(e.light)});flakPuffs.length=0;
  debris.forEach(d=>scene.remove(d.mesh));debris.length=0;
  fallingPlanes.forEach(fp=>{fp.smokeTrail.forEach(s=>scene.remove(s));scene.remove(fp.mesh)});fallingPlanes.length=0;
  splashes.forEach(sp=>scene.remove(sp.group));splashes.length=0;
  waveActive=false;wavePause=3;waveNumber=0;currentWave=null;waveSpawnIndex=0;waveSpawnTimer=0;lastWaveAngle=Math.random()*Math.PI*2;
  gameActive=true;lastTime=performance.now();
  try{renderer.domElement.requestPointerLock();}catch(e){}
}
window._startGame=startGame;

document.getElementById('start-screen').addEventListener('click',()=>{
  initAudio();
  document.getElementById('start-screen').style.display='none';
  startGame();
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  layoutGun();
});

// Position gun elements based on screen aspect ratio so barrels are always visible
function layoutGun(){
  const aspect=innerWidth/innerHeight;
  // At z=7 from camera with FOV 70, half-width = 7*tan(35)*aspect
  const halfW=7*Math.tan(35*Math.PI/180)*aspect;
  // Place barrels at 85% of visible half-width
  const outerX=halfW*0.85;
  const innerX=halfW*0.72;
  const shieldX=halfW*0.92;
  const feedX=halfW*0.78;
  const seatX=halfW*0.82;

  barrels[0].group.position.x=-outerX;
  barrels[1].group.position.x=-innerX;
  barrels[2].group.position.x=innerX;
  barrels[3].group.position.x=outerX;
  barrelFlashes[0].position.x=-outerX;
  barrelFlashes[1].position.x=-innerX;
  barrelFlashes[2].position.x=innerX;
  barrelFlashes[3].position.x=outerX;
  barrelPositions[0].x=-outerX;
  barrelPositions[1].x=-innerX;
  barrelPositions[2].x=innerX;
  barrelPositions[3].x=outerX;
  shieldL.position.x=-shieldX;
  shieldR.position.x=shieldX;
  feedL.position.x=-feedX;
  feedR.position.x=feedX;
  seatL2.position.x=-seatX;
  seatR2.position.x=seatX;
}
layoutGun();

requestAnimationFrame(update);
</script>
