<script type="module">
import*as THREE from'three';

// ---- Audio ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function initAudio(){if(!actx)actx=new AudioCtx()}

function playCannonFire(){
  if(!actx)return;
  const t=actx.currentTime;
  const osc=actx.createOscillator(),g=actx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(60,t);osc.frequency.exponentialRampToValueAtTime(20,t+0.4);
  g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  osc.connect(g);g.connect(actx.destination);osc.start(t);osc.stop(t+0.4);
  const buf=actx.createBuffer(1,actx.sampleRate*0.15,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const src=actx.createBufferSource(),gn=actx.createGain();
  src.buffer=buf;gn.gain.setValueAtTime(0.4,t);gn.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(gn);gn.connect(actx.destination);src.start(t);
}

function playShellExplode(){
  if(!actx)return;
  const t=actx.currentTime;
  const buf=actx.createBuffer(1,actx.sampleRate*0.08,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  src.connect(g);g.connect(actx.destination);src.start(t);
  const buf2=actx.createBuffer(1,actx.sampleRate*0.6,actx.sampleRate),d2=buf2.getChannelData(0);
  for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*0.15*Math.pow(1-i/d2.length,2);
  const src2=actx.createBufferSource(),g2=actx.createGain();
  src2.buffer=buf2;g2.gain.setValueAtTime(0.15,t+0.05);g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  src2.connect(g2);g2.connect(actx.destination);src2.start(t+0.05);
}

function playPlaneExplode(){
  if(!actx)return;
  const t=actx.currentTime;
  const buf=actx.createBuffer(1,actx.sampleRate*0.8,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.7,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
  src.connect(g);g.connect(actx.destination);src.start(t);
  const osc=actx.createOscillator(),go=actx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(40,t);osc.frequency.exponentialRampToValueAtTime(15,t+0.6);
  go.gain.setValueAtTime(0.5,t);go.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  osc.connect(go);go.connect(actx.destination);osc.start(t);osc.stop(t+0.6);
}

function playSplash(){
  if(!actx)return;
  const t=actx.currentTime;
  const buf=actx.createBuffer(1,actx.sampleRate*0.5,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.3*Math.pow(1-i/d.length,1.5);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  src.connect(g);g.connect(actx.destination);src.start(t);
}

// ---- Engine ----
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,2000);
camera.position.set(0,8,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setClearColor(0x1a1a4e);
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

// ---- Sky (dawn/dusk) ----
function createSky(){
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  const grd=ctx.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#0b0b2a');
  grd.addColorStop(0.25,'#1b1b4e');
  grd.addColorStop(0.45,'#4a2060');
  grd.addColorStop(0.6,'#c84b31');
  grd.addColorStop(0.72,'#f4a261');
  grd.addColorStop(0.85,'#e9c46a');
  grd.addColorStop(1,'#264653');
  ctx.fillStyle=grd;ctx.fillRect(0,0,512,512);
  for(let i=0;i<300;i++){
    const x=Math.random()*512,y=Math.random()*230,a=Math.random()*.7+.1;
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fillRect(x,y,1.5,1.5);
  }
  const tex=new THREE.CanvasTexture(c);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,32),new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide})));
}
createSky();

// ---- Ocean ----
const oceanGeo=new THREE.PlaneGeometry(2000,2000,40,40);
const oceanMat=new THREE.MeshLambertMaterial({color:0x0a2a3a});
const ocean=new THREE.Mesh(oceanGeo,oceanMat);
ocean.rotation.x=-Math.PI/2;ocean.position.y=-0.5;scene.add(ocean);

// ---- Lighting ----
scene.add(new THREE.AmbientLight(0xffa070,.6));
const dirLight=new THREE.DirectionalLight(0xffe0b0,1.2);
dirLight.position.set(-50,80,-30);scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0x8888cc,0x443322,.4));

// ---- Clouds ----
const clouds=[];
function makeCloud(x,y,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffeedd,transparent:true,opacity:.35});
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(8+Math.random()*12,8,6),mat);
    s.position.set(Math.random()*20-10,Math.random()*4,Math.random()*20-10);
    s.scale.y=.4+Math.random()*.3;g.add(s);
  }
  g.position.set(x,y,z);scene.add(g);clouds.push(g);
}
for(let i=0;i<25;i++)makeCloud(Math.random()*1600-800,60+Math.random()*120,Math.random()*1600-800);

// ---- QUAD 40mm BOFORS MOUNT (bigger, more prominent) ----
const cannonGroup=new THREE.Group();
const cannonPivot=new THREE.Group();

// Base platform - heavy circular base
const baseMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const base=new THREE.Mesh(new THREE.CylinderGeometry(4,4.8,1.8,12),baseMat);
base.position.y=0.9;cannonGroup.add(base);

// Turret ring
const ringMat=new THREE.MeshLambertMaterial({color:0x4a4a4a});
const ring=new THREE.Mesh(new THREE.CylinderGeometry(3.2,3.5,0.8,16),ringMat);
ring.position.y=2;cannonGroup.add(ring);

// Main turret housing
const mountMat=new THREE.MeshLambertMaterial({color:0x505050});
const mount=new THREE.Mesh(new THREE.BoxGeometry(5,2.8,4),mountMat);
mount.position.set(0,0.2,0);cannonPivot.add(mount);

// Armored shield - front plate
const shieldMat=new THREE.MeshLambertMaterial({color:0x4a5a4a});
const shieldFront=new THREE.Mesh(new THREE.BoxGeometry(5.5,3.8,0.25),shieldMat);
shieldFront.position.set(0,0.4,-2.2);cannonPivot.add(shieldFront);

// Shield side plates
const shieldL=new THREE.Mesh(new THREE.BoxGeometry(0.25,3.8,4.5),shieldMat);
shieldL.position.set(-2.75,0.4,0);cannonPivot.add(shieldL);
const shieldR=new THREE.Mesh(new THREE.BoxGeometry(0.25,3.8,4.5),shieldMat);
shieldR.position.set(2.75,0.4,0);cannonPivot.add(shieldR);

// Shield top plate
const shieldTop=new THREE.Mesh(new THREE.BoxGeometry(5.5,0.2,4.5),shieldMat);
shieldTop.position.set(0,2.3,0);cannonPivot.add(shieldTop);

// Four barrels in 2x2 grid with WIDE separation
const barrelMat=new THREE.MeshLambertMaterial({color:0x606060});
const barrelPositions=[
  {x:-0.8,y:1.1},   // top-left
  {x:0.8,y:1.1},    // top-right
  {x:-0.8,y:-0.2},  // bottom-left
  {x:0.8,y:-0.2},   // bottom-right
];
const barrels=[];
const barrelFlashes=[];
const barrelRestZ=-2.2;

for(let i=0;i<4;i++){
  const bp=barrelPositions[i];
  const bGroup=new THREE.Group();

  // Main barrel tube - long cylinder
  const tube=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.24,7,8),barrelMat);
  tube.rotation.x=Math.PI/2;tube.position.set(0,0,-3.5);bGroup.add(tube);

  // Flash suppressor at tip
  const tipMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
  const tip=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.2,0.6,8),tipMat);
  tip.rotation.x=Math.PI/2;tip.position.set(0,0,-7.1);bGroup.add(tip);

  // Barrel jacket near breach
  const sleeve=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,1.5,8),barrelMat);
  sleeve.rotation.x=Math.PI/2;sleeve.position.set(0,0,-0.3);bGroup.add(sleeve);

  bGroup.position.set(bp.x,bp.y,barrelRestZ);
  cannonPivot.add(bGroup);
  barrels.push({group:bGroup,restZ:barrelRestZ,recoil:0});

  // Muzzle flash
  const flashGeo=new THREE.SphereGeometry(0.6,6,6);
  const flashMat2=new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0});
  const flash=new THREE.Mesh(flashGeo,flashMat2);
  flash.position.set(bp.x,bp.y,barrelRestZ-7.6);
  cannonPivot.add(flash);
  barrelFlashes.push(flash);
}

// Iron sight / ring sight on top of the gun
const sightMat=new THREE.MeshLambertMaterial({color:0x333333});
// Sight post - vertical bar
const sightPost=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.8,0.1),sightMat);
sightPost.position.set(0,2.7,-4);cannonPivot.add(sightPost);
// Ring sight - a ring the player looks through
const ringGeo=new THREE.TorusGeometry(0.5,0.04,8,16);
const ringSight=new THREE.Mesh(ringGeo,sightMat);
ringSight.position.set(0,3.1,-4);cannonPivot.add(ringSight);
// Small front bead
const bead=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),new THREE.MeshBasicMaterial({color:0xff4400}));
bead.position.set(0,3.6,-6);cannonPivot.add(bead);
// Front sight post
const frontPost=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.6,0.08),sightMat);
frontPost.position.set(0,3.3,-6);cannonPivot.add(frontPost);

// Ammo feed mechanism
const feedMat=new THREE.MeshLambertMaterial({color:0x444444});
const feedL=new THREE.Mesh(new THREE.BoxGeometry(0.5,1.5,2),feedMat);
feedL.position.set(-0.8,0.4,1);cannonPivot.add(feedL);
const feedR=new THREE.Mesh(new THREE.BoxGeometry(0.5,1.5,2),feedMat);
feedR.position.set(0.8,0.4,1);cannonPivot.add(feedR);

// Gunner seats
const seatMat=new THREE.MeshLambertMaterial({color:0x3a3a3a});
const seatL=new THREE.Mesh(new THREE.BoxGeometry(1,0.8,1.5),seatMat);
seatL.position.set(-3.5,-0.4,0.5);cannonPivot.add(seatL);
const seatR=new THREE.Mesh(new THREE.BoxGeometry(1,0.8,1.5),seatMat);
seatR.position.set(3.5,-0.4,0.5);cannonPivot.add(seatR);

cannonPivot.position.y=2.5;
cannonGroup.add(cannonPivot);
cannonGroup.position.set(0,-5.5,-6);
camera.add(cannonGroup);
scene.add(camera);

// ---- Game State ----
let mouseDown=false,currentBarrel=0,fireTimer=0;
const FIRE_RATE=0.5;
let score=0,gameActive=false;
const shells=[],planes=[],flakPuffs=[],debris=[],fallingPlanes=[],splashes=[];
let aimPitch=0.3,aimYaw=0;
const SHELL_SPEED=180,BLAST_RADIUS=22;

const scoreEl=document.getElementById('score');
const waveInfoEl=document.getElementById('wave-info');

// ---- Raid Wave System (tactical formations) ----
let waveTimer=0,waveActive=false;
let wavePause=3; // initial pause before first wave
let waveNumber=0;
let currentWave=null;
let waveSpawnIndex=0;
let waveSpawnTimer=0;
let lastWaveAngle=Math.random()*Math.PI*2;

function pickDirection(){
  lastWaveAngle+=Math.PI/2+Math.random()*Math.PI/2;
  return lastWaveAngle;
}

function generateWave(){
  const types=['high_bombing','low_torpedo','medium_strafing','mixed'];
  const type=types[Math.floor(Math.random()*types.length)];
  const angle=pickDirection();
  const dist=550;
  const baseX=Math.cos(angle)*dist, baseZ=Math.sin(angle)*dist;
  const dx=-Math.cos(angle), dz=-Math.sin(angle);
  const perpX=-dz, perpZ=dx;
  const wave={type,planes:[]};
  let waveName='';

  if(type==='high_bombing'){
    waveName='High Altitude Bombing Run';
    const count=5+Math.floor(Math.random()*4);
    const alt=180+Math.random()*80;
    const speed=20+Math.random()*8;
    const formation=Math.random()>0.5?'V':'line';
    for(let i=0;i<count;i++){
      let offX,offZ;
      if(formation==='V'){
        const side=i%2===0?1:-1;
        const rank=Math.ceil(i/2);
        offX=perpX*side*rank*18;
        offZ=perpZ*side*rank*18+rank*12;
      }else{
        offX=perpX*(i-(count-1)/2)*18;
        offZ=0;
      }
      wave.planes.push({x:baseX+offX+(Math.random()-0.5)*4,z:baseZ+offZ+(Math.random()-0.5)*4,
        alt:alt+(Math.random()-0.5)*8,speed:speed+(Math.random()-0.5)*3,dx,dz,hp:3});
    }
  }else if(type==='low_torpedo'){
    waveName='Low Altitude Torpedo Run';
    const count=3+Math.floor(Math.random()*3);
    const alt=30+Math.random()*20;
    const speed=50+Math.random()*15;
    for(let i=0;i<count;i++){
      wave.planes.push({x:baseX+perpX*(i-(count-1)/2)*22+(Math.random()-0.5)*5,
        z:baseZ+perpZ*(i-(count-1)/2)*22+(Math.random()-0.5)*5,
        alt:alt+(Math.random()-0.5)*6,speed:speed+(Math.random()-0.5)*5,dx,dz,hp:1});
    }
  }else if(type==='medium_strafing'){
    waveName='Medium Altitude Strafing Run';
    const count=4+Math.floor(Math.random()*3);
    const alt=70+Math.random()*50;
    const speed=38+Math.random()*12;
    for(let i=0;i<count;i++){
      const pair=Math.floor(i/2);
      const side=i%2===0?1:-1;
      wave.planes.push({x:baseX+perpX*side*12+dx*pair*(-25)+(Math.random()-0.5)*4,
        z:baseZ+perpZ*side*12+dz*pair*(-25)+(Math.random()-0.5)*4,
        alt:alt+(Math.random()-0.5)*8,speed:speed+(Math.random()-0.5)*4,dx,dz,hp:2});
    }
  }else{
    waveName='Mixed Formation';
    const alt=100+Math.random()*60;
    const bomberCount=3+Math.floor(Math.random()*2);
    const fighterCount=2+Math.floor(Math.random()*3);
    const bomberSpeed=22+Math.random()*6;
    for(let i=0;i<bomberCount;i++){
      wave.planes.push({x:baseX+perpX*(i-(bomberCount-1)/2)*20+(Math.random()-0.5)*3,
        z:baseZ+perpZ*(i-(bomberCount-1)/2)*20+(Math.random()-0.5)*3,
        alt:alt+(Math.random()-0.5)*6,speed:bomberSpeed+(Math.random()-0.5)*3,dx,dz,hp:3});
    }
    for(let i=0;i<fighterCount;i++){
      const side=i%2===0?1:-1;
      const rank=Math.ceil((i+1)/2);
      wave.planes.push({x:baseX+perpX*side*rank*28+dx*(-30)+(Math.random()-0.5)*5,
        z:baseZ+perpZ*side*rank*28+dz*(-30)+(Math.random()-0.5)*5,
        alt:alt+(Math.random()-0.5)*10,speed:bomberSpeed+15+Math.random()*8,dx,dz,hp:1});
    }
  }
  wave.name=waveName;
  return wave;
}

function spawnFormationPlane(p){
  const mesh=createPlane();
  const vx=p.dx*p.speed, vz=p.dz*p.speed;
  mesh.position.set(p.x,p.alt,p.z);
  mesh.lookAt(p.x+vx,p.alt,p.z+vz);
  const s=p.alt>150?0.7:p.alt>100?0.85:1;
  mesh.scale.setScalar(s);
  scene.add(mesh);
  planes.push({mesh,vx,vz,alt:p.alt,speed:p.speed,hp:p.hp,maxHp:p.hp,smoking:false,smokeTrail:[]});
}

// ---- Plane factory ----
function createPlane(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,1,8),new THREE.MeshLambertMaterial({color:0x556655}));
  g.add(body);
  const wing=new THREE.Mesh(new THREE.BoxGeometry(16,.2,3),new THREE.MeshLambertMaterial({color:0x667766}));
  wing.position.y=.2;g.add(wing);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(5,.15,1.5),new THREE.MeshLambertMaterial({color:0x667766}));
  tail.position.set(0,.3,-3.5);g.add(tail);
  const vTail=new THREE.Mesh(new THREE.BoxGeometry(.2,3,2),new THREE.MeshLambertMaterial({color:0x556655}));
  vTail.position.set(0,1.5,-3.5);g.add(vTail);
  for(let s of[-4,4]){
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,2,6),new THREE.MeshLambertMaterial({color:0x444444}));
    eng.rotation.x=Math.PI/2;eng.position.set(s,-.2,1);g.add(eng);
  }
  return g;
}

// (Plane spawning handled by formation system above)

// ---- Shell: visible traveling projectile ----
function fireShell(){
  playCannonFire();
  const bi=currentBarrel;
  currentBarrel=(currentBarrel+1)%4;
  barrels[bi].recoil=0.6;
  barrelFlashes[bi].material.opacity=1;
  setTimeout(()=>{barrelFlashes[bi].material.opacity=0},60);

  const bp=barrelPositions[bi];
  const flashLight=new THREE.PointLight(0xffaa00,4,20);
  const worldPos=new THREE.Vector3();
  barrelFlashes[bi].getWorldPosition(worldPos);
  flashLight.position.copy(worldPos);
  scene.add(flashLight);
  setTimeout(()=>scene.remove(flashLight),80);

  const dir=new THREE.Vector3(0,0,-1);
  dir.applyQuaternion(camera.quaternion);
  dir.normalize();
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(.25,4,4),new THREE.MeshBasicMaterial({color:0xffcc00}));
  mesh.position.copy(camera.position).add(new THREE.Vector3(0,-1,0));
  const tail=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,2,4),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.6}));
  tail.lookAt(dir);tail.rotateX(Math.PI/2);
  mesh.add(tail);
  scene.add(mesh);
  shells.push({mesh,dir,speed:SHELL_SPEED,traveled:0,alive:true});
}

// ---- Flak Burst ----
function createFlakBurst(pos){
  playShellExplode();
  const g=new THREE.Group();
  for(let i=0;i<14;i++){
    const shade=0x1a1a1a+Math.floor(Math.random()*0x222222);
    const puff=new THREE.Mesh(
      new THREE.SphereGeometry(1.5+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color:shade,transparent:true,opacity:0.85})
    );
    const offset=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*4);
    puff.position.copy(offset);
    puff.userData.vel=offset.clone().normalize().multiplyScalar(1.5+Math.random()*2);
    g.add(puff);
  }
  const flash=new THREE.Mesh(
    new THREE.SphereGeometry(1.5,6,6),
    new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.9})
  );
  flash.userData.isFlash=true;
  g.add(flash);
  g.position.copy(pos);scene.add(g);
  const light=new THREE.PointLight(0xff6600,3,40);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:g,light,age:0,duration:4+Math.random()*2});
}

function checkFlakDamage(pos){
  for(let j=planes.length-1;j>=0;j--){
    const p=planes[j];
    const dist=p.mesh.position.distanceTo(pos);
    if(dist<BLAST_RADIUS){
      p.hp--;
      if(p.hp>0&&!p.smoking)p.smoking=true;
      if(p.hp<=0){
        score++;
        scoreEl.textContent='Score: '+score;
        // Don't remove — convert to falling wreckage
        startPlaneCrash(p,j);
      }
    }
  }
}

// ---- Plane Crash System (planes fall, tumble, splash into ocean) ----
function startPlaneCrash(p,idx){
  playPlaneExplode();
  // Remove from active planes
  p.smokeTrail.forEach(s=>scene.remove(s));
  planes.splice(idx,1);

  // Initial explosion effect at the plane
  const pos=p.mesh.position.clone();
  const fireGroup=new THREE.Group();
  for(let i=0;i<10;i++){
    const color=[0xff4400,0xff8800,0xffcc00][Math.floor(Math.random()*3)];
    const ball=new THREE.Mesh(
      new THREE.SphereGeometry(0.8+Math.random()*2,5,5),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:1})
    );
    const d=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(2+Math.random()*3);
    ball.position.copy(d);
    ball.userData.vel=d.clone().normalize().multiplyScalar(10+Math.random()*15);
    fireGroup.add(ball);
  }
  fireGroup.position.copy(pos);scene.add(fireGroup);
  const light=new THREE.PointLight(0xff4400,6,60);light.position.copy(pos);scene.add(light);
  flakPuffs.push({group:fireGroup,light,age:0,duration:1.5});

  // Make the plane mesh look damaged — change color to dark/burning
  p.mesh.traverse(child=>{
    if(child.isMesh&&child.material){
      child.material=child.material.clone();
      child.material.color.setHex(0x332211);
    }
  });

  // Add fire effect attached to the plane
  const fireMeshes=[];
  for(let i=0;i<4;i++){
    const fire=new THREE.Mesh(
      new THREE.SphereGeometry(0.8+Math.random()*1.2,5,5),
      new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.8})
    );
    fire.position.set((Math.random()-0.5)*4,Math.random()*2,(Math.random()-0.5)*4);
    p.mesh.add(fire);
    fireMeshes.push(fire);
  }

  // Convert to falling plane
  fallingPlanes.push({
    mesh:p.mesh,
    vx:p.vx*0.5, // keep some forward momentum
    vz:p.vz*0.5,
    vy:-5-Math.random()*10, // start falling
    rotX:(Math.random()-0.5)*3, // tumble rates
    rotZ:(Math.random()-0.5)*3,
    rotY:(Math.random()-0.5)*1,
    fireMeshes,
    smokeTimer:0,
    smokeTrail:[]
  });
}

// ---- Splash/Impact effect when wreckage hits ocean ----
function createSplash(pos){
  playSplash();
  const g=new THREE.Group();
  // Water spray
  for(let i=0;i<12;i++){
    const spray=new THREE.Mesh(
      new THREE.SphereGeometry(0.5+Math.random()*1.5,5,5),
      new THREE.MeshBasicMaterial({color:0x88bbdd,transparent:true,opacity:0.7})
    );
    const angle=Math.random()*Math.PI*2;
    const speed=8+Math.random()*15;
    spray.userData.vel=new THREE.Vector3(Math.cos(angle)*speed,10+Math.random()*15,Math.sin(angle)*speed);
    g.add(spray);
  }
  // White foam ring
  const foam=new THREE.Mesh(
    new THREE.RingGeometry(0.5,4,16),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.6,side:THREE.DoubleSide})
  );
  foam.rotation.x=-Math.PI/2;
  foam.userData.isRing=true;
  g.add(foam);
  g.position.set(pos.x,0.5,pos.z);
  scene.add(g);
  splashes.push({group:g,age:0,duration:2.5});
}

// ---- Input (FIX #1: correct mouse direction — positive movementX = aim right) ----
document.addEventListener('mousemove',e=>{
  if(!gameActive)return;
  aimYaw+=e.movementX*.002;
  aimPitch-=e.movementY*.002;
  aimPitch=Math.max(.05,Math.min(1.4,aimPitch));
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameActive){fireShell();mouseDown=true;fireTimer=0;}
});
document.addEventListener('mouseup',e=>{
  if(e.button===0)mouseDown=false;
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ---- Game loop ----
let lastTime=0;
function update(time){
  requestAnimationFrame(update);
  if(!gameActive){renderer.render(scene,camera);return}
  const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;

  // Camera
  camera.rotation.set(0,0,0);
  camera.rotateY(-aimYaw);
  camera.rotateX(aimPitch);

  cannonPivot.rotation.set(0,0,0);

  // Auto-fire while holding mouse
  if(mouseDown){
    fireTimer+=dt;
    while(fireTimer>=FIRE_RATE){
      fireTimer-=FIRE_RATE;
      fireShell();
    }
  }

  // Barrel recoil animation
  for(let i=0;i<4;i++){
    const b=barrels[i];
    if(b.recoil>0){
      b.recoil=Math.max(0,b.recoil-dt*4);
      b.group.position.z=b.restZ+b.recoil*0.5;
    }else{
      b.group.position.z=b.restZ;
    }
  }

  // ---- Wave spawning system (tactical formations) ----
  if(currentWave){
    waveSpawnTimer+=dt;
    if(waveSpawnTimer>=0.3&&waveSpawnIndex<currentWave.planes.length){
      waveSpawnTimer=0;
      spawnFormationPlane(currentWave.planes[waveSpawnIndex]);
      waveSpawnIndex++;
    }
    if(waveSpawnIndex>=currentWave.planes.length){
      currentWave=null;
      wavePause=5+Math.random()*5;
    }
  }else{
    wavePause-=dt;
    if(wavePause<=0){
      waveNumber++;
      currentWave=generateWave();
      waveSpawnIndex=0;
      waveSpawnTimer=0;
      waveInfoEl.textContent=currentWave.name.toUpperCase()+' — Wave '+waveNumber;
      waveInfoEl.style.opacity='1';
      setTimeout(()=>{waveInfoEl.style.opacity='0'},3000);
    }
  }

  // Update shells
  for(let i=shells.length-1;i>=0;i--){
    const s=shells[i];
    s.mesh.position.addScaledVector(s.dir,s.speed*dt);
    s.traveled+=s.speed*dt;
    let detonated=false;
    if(s.traveled>40){
      for(let j=0;j<planes.length;j++){
        if(planes[j].mesh.position.distanceTo(s.mesh.position)<22){
          detonated=true;break;
        }
      }
    }
    if(s.traveled>600)detonated=true;
    if(detonated){
      const burstPos=s.mesh.position.clone();
      createFlakBurst(burstPos);
      checkFlakDamage(burstPos);
      scene.remove(s.mesh);shells.splice(i,1);
    }
  }

  // Update active planes
  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.z+=p.vz*dt;
    // Smoke trail for damaged planes
    if(p.smoking){
      if(!p._smokeTimer)p._smokeTimer=0;
      p._smokeTimer+=dt;
      if(p._smokeTimer>0.08){
        p._smokeTimer=0;
        const smoke=new THREE.Mesh(
          new THREE.SphereGeometry(0.8+Math.random()*1.2,4,4),
          new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:0.5})
        );
        smoke.position.copy(p.mesh.position);
        scene.add(smoke);
        p.smokeTrail.push(smoke);
        smoke.userData.age=0;
      }
      for(let si=p.smokeTrail.length-1;si>=0;si--){
        const sm=p.smokeTrail[si];
        sm.userData.age+=dt;
        sm.material.opacity=Math.max(0,0.5-sm.userData.age*0.15);
        sm.scale.setScalar(1+sm.userData.age*1.5);
        if(sm.userData.age>3){scene.remove(sm);p.smokeTrail.splice(si,1);}
      }
    }
    if(p.mesh.position.length()>800){
      p.smokeTrail.forEach(s=>scene.remove(s));
      scene.remove(p.mesh);planes.splice(i,1);
    }
  }

  // Update falling/crashing planes
  for(let i=fallingPlanes.length-1;i>=0;i--){
    const fp=fallingPlanes[i];
    fp.vy-=15*dt; // gravity
    fp.mesh.position.x+=fp.vx*dt;
    fp.mesh.position.y+=fp.vy*dt;
    fp.mesh.position.z+=fp.vz*dt;
    fp.mesh.rotation.x+=fp.rotX*dt;
    fp.mesh.rotation.z+=fp.rotZ*dt;
    fp.mesh.rotation.y+=fp.rotY*dt;

    // Smoke trail while falling
    fp.smokeTimer+=dt;
    if(fp.smokeTimer>0.06){
      fp.smokeTimer=0;
      const smoke=new THREE.Mesh(
        new THREE.SphereGeometry(0.6+Math.random()*1,4,4),
        new THREE.MeshBasicMaterial({color:Math.random()>0.5?0x222222:0x553311,transparent:true,opacity:0.6})
      );
      smoke.position.copy(fp.mesh.position);
      scene.add(smoke);
      fp.smokeTrail.push(smoke);
      smoke.userData.age=0;
    }
    for(let si=fp.smokeTrail.length-1;si>=0;si--){
      const sm=fp.smokeTrail[si];
      sm.userData.age+=dt;
      sm.material.opacity=Math.max(0,0.6-sm.userData.age*0.2);
      sm.scale.setScalar(1+sm.userData.age*2);
      if(sm.userData.age>3){scene.remove(sm);fp.smokeTrail.splice(si,1);}
    }

    // Flicker fire
    fp.fireMeshes.forEach(f=>{
      f.material.opacity=0.5+Math.random()*0.5;
      f.scale.setScalar(0.8+Math.random()*0.6);
    });

    // Hit the ocean
    if(fp.mesh.position.y<=0){
      createSplash(fp.mesh.position);
      // Small debris burst at impact
      for(let d=0;d<6;d++){
        const size=0.3+Math.random()*1;
        const geo=new THREE.BoxGeometry(size,0.2,size*1.5);
        const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0x443322}));
        m.position.copy(fp.mesh.position);m.position.y=1;
        const vel=new THREE.Vector3((Math.random()-0.5)*20,5+Math.random()*10,(Math.random()-0.5)*20);
        scene.add(m);debris.push({mesh:m,vel,rotVel:new THREE.Vector3(Math.random()*4,Math.random()*4,Math.random()*4),age:0});
      }
      fp.smokeTrail.forEach(s=>scene.remove(s));
      scene.remove(fp.mesh);
      fallingPlanes.splice(i,1);
    }
    // Remove if too far away
    if(fp.mesh.position.length()>900){
      fp.smokeTrail.forEach(s=>scene.remove(s));
      scene.remove(fp.mesh);
      fallingPlanes.splice(i,1);
    }
  }

  // Update flak puffs & explosions
  for(let i=flakPuffs.length-1;i>=0;i--){
    const e=flakPuffs[i];e.age+=dt;
    const t=e.age/e.duration;
    if(t>=1){scene.remove(e.group);scene.remove(e.light);flakPuffs.splice(i,1);continue}
    e.light.intensity=Math.max(0,e.light.intensity-dt*8);
    e.group.children.forEach(c=>{
      if(c.material){
        if(c.userData.isFlash){
          c.material.opacity=Math.max(0,0.9-e.age*6);
        }else if(c.userData.vel){
          c.position.addScaledVector(c.userData.vel,dt*0.3);
          c.scale.setScalar(1+t*2.5);
          c.material.opacity=t<0.6?0.75:Math.max(0,0.75*(1-(t-0.6)/0.4));
        }
      }
    });
  }

  // Update debris
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];d.age+=dt;
    d.vel.y-=40*dt;
    d.mesh.position.addScaledVector(d.vel,dt);
    d.mesh.rotation.x+=d.rotVel.x*dt;
    d.mesh.rotation.z+=d.rotVel.z*dt;
    if(d.isFire)d.mesh.material.opacity=Math.max(0,1-d.age/2.5);
    if(d.mesh.position.y<0||d.age>6){scene.remove(d.mesh);debris.splice(i,1)}
  }

  // Update splashes
  for(let i=splashes.length-1;i>=0;i--){
    const sp=splashes[i];sp.age+=dt;
    const t=sp.age/sp.duration;
    if(t>=1){scene.remove(sp.group);splashes.splice(i,1);continue}
    sp.group.children.forEach(c=>{
      if(c.userData.isRing){
        c.scale.setScalar(1+sp.age*4);
        c.material.opacity=Math.max(0,0.6-t);
      }else if(c.userData.vel){
        c.userData.vel.y-=30*dt;
        c.position.addScaledVector(c.userData.vel,dt);
        c.material.opacity=Math.max(0,0.7-t);
      }
    });
  }

  // Clouds drift
  clouds.forEach(c=>{c.position.x+=2*dt;if(c.position.x>800)c.position.x=-800});

  renderer.render(scene,camera);
}

function startGame(){
  score=0;
  scoreEl.textContent='Score: 0';
  shells.forEach(s=>scene.remove(s.mesh));shells.length=0;
  planes.forEach(p=>{scene.remove(p.mesh);if(p.smokeTrail)p.smokeTrail.forEach(s=>scene.remove(s))});planes.length=0;
  flakPuffs.forEach(e=>{scene.remove(e.group);scene.remove(e.light)});flakPuffs.length=0;
  debris.forEach(d=>scene.remove(d.mesh));debris.length=0;
  fallingPlanes.forEach(fp=>{fp.smokeTrail.forEach(s=>scene.remove(s));scene.remove(fp.mesh)});fallingPlanes.length=0;
  splashes.forEach(sp=>scene.remove(sp.group));splashes.length=0;
  waveActive=false;wavePause=3;waveNumber=0;currentWave=null;waveSpawnIndex=0;waveSpawnTimer=0;lastWaveAngle=Math.random()*Math.PI*2;
  gameActive=true;lastTime=performance.now();
  try{renderer.domElement.requestPointerLock();}catch(e){}
}
window._startGame=startGame;

document.getElementById('start-screen').addEventListener('click',()=>{
  initAudio();
  document.getElementById('start-screen').style.display='none';
  startGame();
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

requestAnimationFrame(update);
</script>
