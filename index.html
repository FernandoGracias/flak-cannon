<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flak Cannon</title>
<style>
*{margin:0;padding:0;overflow:hidden}
body{background:#000;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:20px;box-sizing:border-box}
#hud *{color:#fff;text-shadow:0 0 6px rgba(0,0,0,.8)}
#score{font-size:28px;font-weight:bold}
#wave{font-size:18px;margin-top:4px;color:#ffa}
#ammo-bar{margin-top:12px;display:flex;gap:4px;align-items:center}
.shell{width:8px;height:24px;background:#fc0;border-radius:2px;transition:opacity .15s}
.shell.spent{opacity:.15}
#reload-msg{position:fixed;bottom:30%;left:50%;transform:translateX(-50%);font-size:36px;color:#f44;text-shadow:0 0 10px #f00;display:none;pointer-events:none;z-index:10}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10}
#crosshair div{position:absolute;background:rgba(255,255,255,.7)}
#ch-t{width:2px;height:16px;left:-1px;top:-24px}
#ch-b{width:2px;height:16px;left:-1px;top:8px}
#ch-l{width:16px;height:2px;top:-1px;left:-24px}
#ch-r{width:16px;height:2px;top:-1px;left:8px}
#ch-dot{width:4px;height:4px;border-radius:50%;left:-2px;top:-2px;background:rgba(255,80,80,.9)}
#start-screen{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;cursor:pointer}
#start-screen h1{font-size:64px;color:#fc0;text-shadow:0 0 30px #f80,0 0 60px #f40;margin-bottom:10px}
#start-screen p{font-size:22px;color:#ccc;margin-bottom:30px}
#start-screen .hint{font-size:16px;color:#888}
#game-over{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;cursor:pointer}
#game-over h1{font-size:52px;color:#f44;text-shadow:0 0 20px #f00;margin-bottom:10px}
#game-over .final-score{font-size:36px;color:#fc0;margin-bottom:30px}
#game-over .hint{font-size:16px;color:#888}
#altitude-indicator{position:fixed;right:30px;top:50%;transform:translateY(-50%);width:6px;height:300px;background:rgba(255,255,255,.1);border-radius:3px;pointer-events:none;z-index:10}
#alt-marker{position:absolute;width:14px;height:4px;background:#fc0;left:-4px;border-radius:2px;transition:top .05s}
#alt-label{position:absolute;right:16px;color:#fc0;font-size:12px;font-family:'Courier New';white-space:nowrap}
</style>
</head>
<body>
<div id="start-screen">
  <h1>FLAK CANNON</h1>
  <p>Defend the skies against incoming bombers</p>
  <div class="hint">Click to start — Mouse to aim, Left Click to fire, R to reload</div>
</div>
<div id="game-over">
  <h1>GAME OVER</h1>
  <div class="final-score" id="final-score">Score: 0</div>
  <div class="hint">Click to play again</div>
</div>
<div id="hud">
  <div id="score">0</div>
  <div id="wave">WAVE 1</div>
  <div id="ammo-bar"></div>
</div>
<div id="reload-msg">RELOADING...</div>
<div id="crosshair"><div id="ch-t"></div><div id="ch-b"></div><div id="ch-l"></div><div id="ch-r"></div><div id="ch-dot"></div></div>
<div id="altitude-indicator"><div id="alt-marker"></div><div id="alt-label"></div></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import*as THREE from'three';

// ---- Audio ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function initAudio(){if(!actx)actx=new AudioCtx()}
function playSound(type){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;
  o.connect(g);g.connect(actx.destination);
  if(type==='fire'){
    o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(30,t+.3);
    g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);
  }else if(type==='explode'){
    const buf=actx.createBuffer(1,actx.sampleRate*.4,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const s=actx.createBufferSource(),g2=actx.createGain();
    s.buffer=buf;s.connect(g2);g2.connect(actx.destination);
    g2.gain.setValueAtTime(.5,t);g2.gain.exponentialRampToValueAtTime(.001,t+.4);s.start(t);
    return;
  }else if(type==='hit'){
    const buf=actx.createBuffer(1,actx.sampleRate*.6,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
    const s=actx.createBufferSource(),g2=actx.createGain();
    s.buffer=buf;s.connect(g2);g2.connect(actx.destination);
    g2.gain.setValueAtTime(.7,t);g2.gain.exponentialRampToValueAtTime(.001,t+.6);s.start(t);
    return;
  }else if(type==='reload'){
    o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.setValueAtTime(800,t+.1);
    g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);
  }
}

// ---- Engine ----
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,2000);
camera.position.set(0,8,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

// ---- Sky ----
function createSky(){
  const c=document.createElement('canvas');c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  const grd=ctx.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#0a0a2e');grd.addColorStop(.3,'#1a1a4e');grd.addColorStop(.55,'#c84b31');
  grd.addColorStop(.7,'#f4a261');grd.addColorStop(.85,'#e9c46a');grd.addColorStop(1,'#264653');
  ctx.fillStyle=grd;ctx.fillRect(0,0,512,512);
  // stars
  for(let i=0;i<200;i++){
    const x=Math.random()*512,y=Math.random()*256,a=Math.random()*.6+.1;
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fillRect(x,y,1.5,1.5);
  }
  const tex=new THREE.CanvasTexture(c);
  const geo=new THREE.SphereGeometry(900,32,32);
  const mat=new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide});
  scene.add(new THREE.Mesh(geo,mat));
}
createSky();

// ---- Lighting ----
const ambLight=new THREE.AmbientLight(0xffa070,.6);scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0xffe0b0,1.2);
dirLight.position.set(-50,80,-30);scene.add(dirLight);
const hemiLight=new THREE.HemisphereLight(0x8888cc,0x443322,.4);scene.add(hemiLight);

// ---- Ground ----
{
  const g=new THREE.PlaneGeometry(2000,2000);
  const m=new THREE.MeshLambertMaterial({color:0x1a2a1a});
  const mesh=new THREE.Mesh(g,m);mesh.rotation.x=-Math.PI/2;mesh.position.y=0;
  scene.add(mesh);
}

// ---- Clouds ----
const clouds=[];
function makeCloud(x,y,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffeedd,transparent:true,opacity:.35});
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(8+Math.random()*12,8,6),mat);
    s.position.set(Math.random()*20-10,Math.random()*4,Math.random()*20-10);
    s.scale.y=.4+Math.random()*.3;g.add(s);
  }
  g.position.set(x,y,z);scene.add(g);clouds.push(g);
}
for(let i=0;i<25;i++)makeCloud(Math.random()*1600-800,60+Math.random()*120,Math.random()*1600-800);

// ---- Cannon base ----
{
  const base=new THREE.Mesh(new THREE.CylinderGeometry(2,2.5,1.5,8),new THREE.MeshLambertMaterial({color:0x333333}));
  base.position.set(0,.75,0);scene.add(base);
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.3,.4,4,8),new THREE.MeshLambertMaterial({color:0x555555}));
  barrel.position.set(0,3,0);scene.add(barrel);
}

// ---- Game State ----
let score=0,wave=1,lives=3,gameActive=false,gameOver=false;
let maxAmmo=8,ammo=maxAmmo,reloading=false,reloadTime=2000,reloadStart=0;
const shells=[],planes=[],explosions=[],debris=[];
let aimPitch=.3,aimYaw=0;
const SHELL_SPEED=280,EXPLOSION_RADIUS=18,EXPLOSION_DURATION=.6;
let waveTimer=0,wavePlanesLeft=0,waveSpawnInterval=2,waveSpawnTimer=0;
let mouseX=0,mouseY=0;

// ---- HUD ----
const scoreEl=document.getElementById('score'),waveEl=document.getElementById('wave');
const ammoBar=document.getElementById('ammo-bar'),reloadMsg=document.getElementById('reload-msg');
const altMarker=document.getElementById('alt-marker'),altLabel=document.getElementById('alt-label');
function updateAmmoHUD(){
  ammoBar.innerHTML='';
  for(let i=0;i<maxAmmo;i++){
    const d=document.createElement('div');d.className='shell'+(i>=ammo?' spent':'');ammoBar.appendChild(d);
  }
}
updateAmmoHUD();

// ---- Plane factory ----
function createPlane(){
  const g=new THREE.Group();
  // fuselage
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,1,8),new THREE.MeshLambertMaterial({color:0x556655}));
  g.add(body);
  // wings
  const wing=new THREE.Mesh(new THREE.BoxGeometry(16,.2,3),new THREE.MeshLambertMaterial({color:0x667766}));
  wing.position.y=.2;g.add(wing);
  // tail
  const tail=new THREE.Mesh(new THREE.BoxGeometry(5,.15,1.5),new THREE.MeshLambertMaterial({color:0x667766}));
  tail.position.set(0,.3,-3.5);g.add(tail);
  const vTail=new THREE.Mesh(new THREE.BoxGeometry(.2,3,2),new THREE.MeshLambertMaterial({color:0x556655}));
  vTail.position.set(0,1.5,-3.5);g.add(vTail);
  // engines
  for(let s of[-4,4]){
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,2,6),new THREE.MeshLambertMaterial({color:0x444444}));
    eng.rotation.x=Math.PI/2;eng.position.set(s,-.2,1);g.add(eng);
  }
  return g;
}

function spawnPlane(){
  const mesh=createPlane();
  const alt=40+Math.random()*100+wave*5;
  const angle=Math.random()*Math.PI*2;
  const dist=500+Math.random()*200;
  const sx=Math.cos(angle)*dist,sz=Math.sin(angle)*dist;
  const speed=30+Math.random()*20+wave*3;
  // fly toward a point near center
  const tx=Math.random()*200-100,tz=Math.random()*200-100;
  const dx=tx-sx,dz=tz-sz,len=Math.sqrt(dx*dx+dz*dz);
  const vx=dx/len*speed,vz=dz/len*speed;
  mesh.position.set(sx,alt,sz);
  mesh.lookAt(sx+vx,alt,sz+vz);
  scene.add(mesh);
  planes.push({mesh,vx,vz,alt,speed,hp:1});
}

// ---- Shell ----
function fireShell(){
  if(ammo<=0||reloading)return;
  ammo--;updateAmmoHUD();playSound('fire');
  const dir=new THREE.Vector3(0,0,-1);
  dir.applyAxisAngle(new THREE.Vector3(1,0,0),-aimPitch);
  dir.applyAxisAngle(new THREE.Vector3(0,1,0),-aimYaw);
  dir.normalize();
  const geo=new THREE.SphereGeometry(.3,4,4);
  const mat=new THREE.MeshBasicMaterial({color:0xffcc00});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(camera.position).add(new THREE.Vector3(0,-1,0));
  scene.add(mesh);
  // target altitude based on pitch
  const targetAlt=8+Math.tan(aimPitch)*200;
  shells.push({mesh,dir,speed:SHELL_SPEED,targetAlt:Math.max(20,targetAlt),traveled:0});
  // muzzle flash
  const flash=new THREE.PointLight(0xffaa00,3,30);
  flash.position.copy(mesh.position);scene.add(flash);
  setTimeout(()=>scene.remove(flash),80);
  if(ammo<=0)startReload();
}

function startReload(){
  reloading=true;reloadStart=performance.now();reloadMsg.style.display='block';playSound('reload');
}

// ---- Explosion ----
function createExplosion(pos,radius){
  playSound('explode');
  const g=new THREE.Group();
  // core flash
  const core=new THREE.Mesh(new THREE.SphereGeometry(radius*.4,8,8),new THREE.MeshBasicMaterial({color:0xffaa33,transparent:true}));
  g.add(core);
  // shrapnel puffs
  for(let i=0;i<12;i++){
    const puff=new THREE.Mesh(new THREE.SphereGeometry(1+Math.random()*2,6,6),
      new THREE.MeshBasicMaterial({color:Math.random()>.5?0xff6600:0xffcc00,transparent:true}));
    const d=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize().multiplyScalar(radius*.6);
    puff.position.copy(d);puff.userData.vel=d.clone().normalize().multiplyScalar(20+Math.random()*15);
    g.add(puff);
  }
  // smoke
  for(let i=0;i<8;i++){
    const smoke=new THREE.Mesh(new THREE.SphereGeometry(2+Math.random()*3,6,6),
      new THREE.MeshBasicMaterial({color:0x444444,transparent:true,opacity:.5}));
    const d=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize().multiplyScalar(radius*.3);
    smoke.position.copy(d);smoke.userData.vel=d.clone().normalize().multiplyScalar(8+Math.random()*8);
    g.add(smoke);
  }
  g.position.copy(pos);scene.add(g);
  const light=new THREE.PointLight(0xff6600,5,radius*4);light.position.copy(pos);scene.add(light);
  explosions.push({group:g,light,age:0,duration:EXPLOSION_DURATION,radius});
}

// ---- Debris ----
function createDebris(pos){
  playSound('hit');
  for(let i=0;i<10;i++){
    const geo=new THREE.BoxGeometry(1+Math.random()*2,.3+Math.random(),1+Math.random()*2);
    const mat=new THREE.MeshLambertMaterial({color:Math.random()>.5?0x556655:0x667766});
    const m=new THREE.Mesh(geo,mat);m.position.copy(pos).add(new THREE.Vector3(Math.random()*6-3,Math.random()*4-2,Math.random()*6-3));
    const vel=new THREE.Vector3(Math.random()*40-20,Math.random()*10-20,Math.random()*40-20);
    const rotVel=new THREE.Vector3(Math.random()*5,Math.random()*5,Math.random()*5);
    scene.add(m);debris.push({mesh:m,vel,rotVel,age:0});
  }
  // fire trail
  for(let i=0;i<5;i++){
    const fire=new THREE.Mesh(new THREE.SphereGeometry(.8,4,4),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true}));
    fire.position.copy(pos).add(new THREE.Vector3(Math.random()*4-2,Math.random()*2,Math.random()*4-2));
    const vel=new THREE.Vector3(Math.random()*10-5,-15-Math.random()*10,Math.random()*10-5);
    scene.add(fire);debris.push({mesh:fire,vel,rotVel:new THREE.Vector3(),age:0,isFire:true});
  }
}

// ---- Input ----
document.addEventListener('mousemove',e=>{
  if(!gameActive)return;
  mouseX=e.clientX;mouseY=e.clientY;
  aimYaw+=e.movementX*-.002;
  aimPitch+=e.movementY*-.002;
  aimPitch=Math.max(.05,Math.min(1.4,aimPitch));
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameActive)fireShell();
});
document.addEventListener('keydown',e=>{
  if(e.key==='r'&&gameActive&&!reloading&&ammo<maxAmmo)startReload();
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ---- Wave management ----
function startWave(){
  wavePlanesLeft=3+wave*2;
  waveSpawnInterval=Math.max(.5,2-.1*wave);
  waveSpawnTimer=0;
  waveEl.textContent=`WAVE ${wave}`;
}

// ---- Game loop ----
let lastTime=0;
function update(time){
  requestAnimationFrame(update);
  if(!gameActive){renderer.render(scene,camera);return}
  const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;

  // camera look
  camera.rotation.set(0,0,0);
  camera.rotateY(-aimYaw);
  camera.rotateX(aimPitch);

  // altitude indicator
  const aimAlt=8+Math.tan(aimPitch)*200;
  const pct=1-Math.min(1,Math.max(0,(aimAlt-20)/180));
  altMarker.style.top=pct*296+'px';
  altLabel.style.top=pct*296-6+'px';
  altLabel.textContent=Math.round(aimAlt)+'m';

  // reload
  if(reloading){
    if(performance.now()-reloadStart>reloadTime){
      reloading=false;ammo=maxAmmo;updateAmmoHUD();reloadMsg.style.display='none';
    }
  }

  // spawn planes
  waveSpawnTimer+=dt;
  if(wavePlanesLeft>0&&waveSpawnTimer>=waveSpawnInterval){
    waveSpawnTimer=0;spawnPlane();wavePlanesLeft--;
  }
  if(wavePlanesLeft<=0&&planes.length===0){
    wave++;startWave();
  }

  // update shells
  for(let i=shells.length-1;i>=0;i--){
    const s=shells[i];
    const move=s.speed*dt;
    s.mesh.position.addScaledVector(s.dir,move);
    s.traveled+=move;
    // explode at target altitude or max range
    if(s.mesh.position.y>=s.targetAlt||s.traveled>600){
      createExplosion(s.mesh.position.clone(),EXPLOSION_RADIUS);
      // check plane hits
      for(let j=planes.length-1;j>=0;j--){
        const p=planes[j];
        const dist=p.mesh.position.distanceTo(s.mesh.position);
        if(dist<EXPLOSION_RADIUS+8){
          p.hp--;
          if(p.hp<=0){
            score+=100*wave;scoreEl.textContent=score;
            createDebris(p.mesh.position.clone());
            scene.remove(p.mesh);planes.splice(j,1);
          }
        }
      }
      scene.remove(s.mesh);shells.splice(i,1);
    }
  }

  // update planes
  for(let i=planes.length-1;i>=0;i--){
    const p=planes[i];
    p.mesh.position.x+=p.vx*dt;
    p.mesh.position.z+=p.vz*dt;
    // remove if too far
    const d=p.mesh.position.length();
    if(d>800){scene.remove(p.mesh);planes.splice(i,1);lives--;
      if(lives<=0){endGame();return}
    }
  }

  // update explosions
  for(let i=explosions.length-1;i>=0;i--){
    const e=explosions[i];e.age+=dt;
    const t=e.age/e.duration;
    if(t>=1){scene.remove(e.group);scene.remove(e.light);explosions.splice(i,1);continue}
    e.light.intensity=5*(1-t);
    e.group.children.forEach(c=>{
      c.material.opacity=1-t;
      if(c.userData.vel)c.position.addScaledVector(c.userData.vel,dt);
      c.scale.setScalar(1+t*2);
    });
  }

  // update debris
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];d.age+=dt;
    d.vel.y-=40*dt;
    d.mesh.position.addScaledVector(d.vel,dt);
    d.mesh.rotation.x+=d.rotVel.x*dt;
    d.mesh.rotation.z+=d.rotVel.z*dt;
    if(d.isFire)d.mesh.material.opacity=Math.max(0,1-d.age/2);
    if(d.mesh.position.y<0||d.age>5){scene.remove(d.mesh);debris.splice(i,1)}
  }

  // move clouds slowly
  clouds.forEach(c=>{c.position.x+=2*dt;if(c.position.x>800)c.position.x=-800});

  renderer.render(scene,camera);
}

function endGame(){
  gameActive=false;gameOver=true;
  document.exitPointerLock();
  document.getElementById('final-score').textContent=`Score: ${score}`;
  document.getElementById('game-over').style.display='flex';
}

function startGame(){
  score=0;wave=1;lives=3;ammo=maxAmmo;reloading=false;gameOver=false;
  reloadMsg.style.display='none';
  scoreEl.textContent='0';updateAmmoHUD();
  // clear entities
  shells.forEach(s=>scene.remove(s.mesh));shells.length=0;
  planes.forEach(p=>scene.remove(p.mesh));planes.length=0;
  explosions.forEach(e=>{scene.remove(e.group);scene.remove(e.light)});explosions.length=0;
  debris.forEach(d=>scene.remove(d.mesh));debris.length=0;
  gameActive=true;lastTime=performance.now();
  startWave();
  renderer.domElement.requestPointerLock();
}

// ---- Start / Restart ----
document.getElementById('start-screen').addEventListener('click',()=>{
  initAudio();
  document.getElementById('start-screen').style.display='none';
  startGame();
});
document.getElementById('game-over').addEventListener('click',()=>{
  document.getElementById('game-over').style.display='none';
  startGame();
});

// ---- Resize ----
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

requestAnimationFrame(update);
</script>
</body>
</html>
